<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>시계 골라봐 ✨</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #fce4ec 0%, #fff9c4 30%, #e3f2fd 60%, #f3e5f5 100%);
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    padding: 24px;
  }
  h1 {
    color: #6a1b9a;
    text-shadow: 0 1px 3px rgba(123,31,162,0.15);
    letter-spacing: 0.12em;
    font-size: clamp(22px, 4vw, 40px);
    margin-bottom: clamp(20px, 4vh, 40px);
    text-align: center;
  }
  .cards {
    /* 5개 카드 — 데스크톱은 1×5, 중간 화면은 3×2, 모바일은 2×3 그리드 */
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: clamp(12px, 2.5vw, 24px);
    width: 100%;
    max-width: 1280px;
  }
  .card {
    aspect-ratio: 1 / 1;
    /* 가로 길고 세로 짧은 화면(모바일 가로 등)에서도 잘리지 않도록 상한 */
    max-height: 60vh;
    border-radius: 24px;
    background: rgba(255,255,255,0.55);
    backdrop-filter: blur(10px);
    box-shadow: 0 8px 28px rgba(0,0,0,0.08), inset 0 0 0 2px rgba(255,255,255,0.6);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    text-decoration: none;
    color: inherit;
    cursor: pointer;
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.3s ease;
    padding: 20px;
    overflow: hidden;
    position: relative;
  }
  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--card-bg);
    opacity: 0.55;
    z-index: -1;
  }
  .card:hover {
    transform: scale(1.05) translateY(-4px);
    box-shadow: 0 16px 40px rgba(0,0,0,0.18), inset 0 0 0 2px rgba(255,255,255,0.8);
  }
  .card.teenie { --card-bg: linear-gradient(160deg, #fce4ec, #f8bbd0); }
  .card.pokemon { --card-bg: linear-gradient(160deg, #fff9c4, #ffe082); }
  .card.solar { --card-bg: linear-gradient(160deg, #1a237e, #311b92 60%, #1a1340); }
  .card.solar { box-shadow: 0 8px 28px rgba(13,27,61,0.35), inset 0 0 0 2px rgba(255,213,79,0.5); }
  .card.solar:hover { box-shadow: 0 16px 40px rgba(13,27,61,0.55), inset 0 0 0 2px rgba(255,213,79,0.8); }
  .card.dinosaur { --card-bg: linear-gradient(160deg, #1b3d2b, #2e5f3e 35%, #5c3a14 80%, #3a2812); }
  .card.dinosaur { box-shadow: 0 8px 28px rgba(27,61,43,0.4), inset 0 0 0 2px rgba(255,183,77,0.5); }
  .card.dinosaur:hover { box-shadow: 0 16px 40px rgba(27,61,43,0.6), inset 0 0 0 2px rgba(255,183,77,0.85); }
  .card.skz { --card-bg: linear-gradient(160deg, #0d0d1a, #1a1a2e 35%, #2d1a2e 75%, #1a0d14); }
  .card.skz { box-shadow: 0 8px 28px rgba(13,13,26,0.5), inset 0 0 0 2px rgba(255,23,68,0.55); }
  .card.skz:hover { box-shadow: 0 16px 40px rgba(13,13,26,0.7), inset 0 0 0 2px rgba(255,23,68,0.9); }
  .card img {
    width: 50%;
    aspect-ratio: 1;
    object-fit: contain;
    filter: drop-shadow(0 6px 14px rgba(0,0,0,0.18));
    transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .card:hover img { transform: scale(1.08) rotate(-3deg); }
  .card-label {
    font-weight: 800;
    font-size: clamp(20px, 2.8vw, 28px);
    letter-spacing: 0.05em;
    text-align: center;
  }
  .card.teenie .card-label { color: #ad1457; }
  .card.pokemon .card-label { color: #d32f2f; }
  .card.solar .card-label { color: #ffd54f; text-shadow: 0 0 12px rgba(255,213,79,0.5), 0 1px 3px rgba(0,0,0,0.4); }
  .card.solar .card-sub { color: rgba(255,213,79,0.75); }
  .card.dinosaur .card-label { color: #ffb74d; text-shadow: 0 0 12px rgba(255,183,77,0.5), 0 1px 3px rgba(0,0,0,0.4); }
  .card.dinosaur .card-sub { color: rgba(255,183,77,0.78); }
  .card.skz .card-label { color: #ff1744; text-shadow: 0 0 12px rgba(255,23,68,0.6), 0 1px 3px rgba(0,0,0,0.5); }
  .card.skz .card-sub { color: rgba(255,214,0,0.8); }
  .card-sub {
    font-size: clamp(12px, 1.6vw, 14px);
    color: rgba(0,0,0,0.55);
    text-align: center;
    line-height: 1.4;
  }
  .floating {
    position: fixed;
    opacity: 0.18;
    animation: floatUp linear infinite;
    pointer-events: none;
    z-index: 0;
    font-size: 28px;
  }
  @keyframes floatUp {
    0% { transform: translateY(105vh) rotate(0deg); opacity: 0; }
    10% { opacity: 0.18; }
    90% { opacity: 0.18; }
    100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
  }
  /* 중간 화면: 5×1 그리드가 좁아져서 3×2로 폴백 (마지막 줄 2개) */
  @media (max-width: 950px) {
    .cards { grid-template-columns: repeat(3, 1fr); max-width: 95vw; }
  }
  /* 좁은 화면: 2×3 폴백 */
  @media (max-width: 600px) {
    .cards { grid-template-columns: repeat(2, 1fr); max-width: 95vw; }
    .card { aspect-ratio: 1 / 1; max-height: none; }
    .card img { width: 50%; }
  }
  @media (max-width: 420px) {
    .card img { width: 42%; }
  }
</style>
</head>
<body>
<h1>✨ 시계를 골라봐 ✨</h1>
<div class="cards">
  <a class="card teenie" href="teenieping.html">
    <img src="img_teenieping/TP-001_하츄핑.webp" alt="티니핑 시계" draggable="false">
    <div class="card-label">티니핑 시계</div>
    <div class="card-sub">하츄핑과 친구들이 시계가 되어줘</div>
  </a>
  <a class="card pokemon" href="pokemon.html">
    <img src="img_pokemon/gen_1/포켓몬이미지_0025_피카츄.webp" alt="포켓몬 시계" draggable="false">
    <div class="card-label">포켓몬 시계</div>
    <div class="card-sub">9세대 1,025마리 도감과 함께</div>
  </a>
  <a class="card solar" href="solar.html">
    <img src="img_solar/SS-08_토성.webp" alt="태양계 시계" draggable="false">
    <div class="card-label">태양계 시계</div>
    <div class="card-sub">별과 행성이 그리는 시간</div>
  </a>
  <a class="card dinosaur" href="dinosaur.html">
    <img src="img_dinosaur/DN-020_티라노사우루스.webp" alt="공룡 시계" draggable="false">
    <div class="card-label">공룡 시계</div>
    <div class="card-sub">쿵쾅쿵쾅, 공룡들이 살아나</div>
  </a>
  <a class="card skz" href="skz.html">
    <img src="img_skz/SKZ-09_울프찬.webp" alt="SKZ 시계" draggable="false">
    <div class="card-label">SKZ 시계</div>
    <div class="card-sub">스트레이키즈와 SKZOO 친구들</div>
  </a>
</div>
<script>
  // 떠다니는 하트 + 포켓볼 + 별/행성 + 공룡 + SKZ 이모지
  var symbols = ['💗','💖','💕','✨','⚪','🔴','🪐','🌟','⭐','☄️','💫','🦖','🦕','🌿','🦴','🎵','🧭','⚡'];
  for (var i = 0; i < 18; i++) {
    var el = document.createElement('div');
    el.className = 'floating';
    el.textContent = symbols[Math.floor(Math.random() * symbols.length)];
    el.style.left = (Math.random() * 100) + 'vw';
    el.style.fontSize = (16 + Math.random() * 22) + 'px';
    el.style.animationDuration = (10 + Math.random() * 10) + 's';
    el.style.animationDelay = (Math.random() * -20) + 's';
    document.body.appendChild(el);
  }
</script>
</body>
</html>
