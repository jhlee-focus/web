<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>시계 골라봐 ✨</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #fce4ec 0%, #fff9c4 30%, #e3f2fd 60%, #f3e5f5 100%);
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    padding: 24px;
  }
  h1 {
    color: #6a1b9a;
    text-shadow: 0 1px 3px rgba(123,31,162,0.15);
    letter-spacing: 0.12em;
    font-size: clamp(22px, 4vw, 40px);
    margin-bottom: clamp(20px, 4vh, 40px);
    text-align: center;
  }
  .cards {
    display: flex;
    flex-direction: row;
    gap: clamp(16px, 4vw, 40px);
    align-items: stretch;
    justify-content: center;
    flex-wrap: wrap;
    width: 100%;
    max-width: 900px;
  }
  .card {
    flex: 1 1 280px;
    max-width: 380px;
    min-width: 240px;
    aspect-ratio: 4 / 5;
    border-radius: 28px;
    background: rgba(255,255,255,0.55);
    backdrop-filter: blur(10px);
    box-shadow: 0 8px 28px rgba(0,0,0,0.08), inset 0 0 0 2px rgba(255,255,255,0.6);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    text-decoration: none;
    color: inherit;
    cursor: pointer;
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.3s ease;
    padding: 20px;
    overflow: hidden;
    position: relative;
  }
  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--card-bg);
    opacity: 0.55;
    z-index: -1;
  }
  .card:hover {
    transform: scale(1.05) translateY(-4px);
    box-shadow: 0 16px 40px rgba(0,0,0,0.18), inset 0 0 0 2px rgba(255,255,255,0.8);
  }
  .card.teenie { --card-bg: linear-gradient(160deg, #fce4ec, #f8bbd0); }
  .card.pokemon { --card-bg: linear-gradient(160deg, #fff9c4, #ffe082); }
  .card.solar { --card-bg: linear-gradient(160deg, #1a237e, #311b92 60%, #1a1340); }
  .card.solar { box-shadow: 0 8px 28px rgba(13,27,61,0.35), inset 0 0 0 2px rgba(255,213,79,0.5); }
  .card.solar:hover { box-shadow: 0 16px 40px rgba(13,27,61,0.55), inset 0 0 0 2px rgba(255,213,79,0.8); }
  .card img {
    width: 56%;
    aspect-ratio: 1;
    object-fit: contain;
    filter: drop-shadow(0 6px 14px rgba(0,0,0,0.18));
    transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .card:hover img { transform: scale(1.08) rotate(-3deg); }
  .card-label {
    font-weight: 800;
    font-size: clamp(20px, 2.8vw, 28px);
    letter-spacing: 0.05em;
    text-align: center;
  }
  .card.teenie .card-label { color: #ad1457; }
  .card.pokemon .card-label { color: #d32f2f; }
  .card.solar .card-label { color: #ffd54f; text-shadow: 0 0 12px rgba(255,213,79,0.5), 0 1px 3px rgba(0,0,0,0.4); }
  .card.solar .card-sub { color: rgba(255,213,79,0.75); }
  .card-sub {
    font-size: clamp(12px, 1.6vw, 14px);
    color: rgba(0,0,0,0.55);
    text-align: center;
    line-height: 1.4;
  }
  .floating {
    position: fixed;
    opacity: 0.18;
    animation: floatUp linear infinite;
    pointer-events: none;
    z-index: 0;
    font-size: 28px;
  }
  @keyframes floatUp {
    0% { transform: translateY(105vh) rotate(0deg); opacity: 0; }
    10% { opacity: 0.18; }
    90% { opacity: 0.18; }
    100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
  }
  @media (max-width: 520px) {
    .cards { flex-direction: column; align-items: center; }
    .card { aspect-ratio: 3 / 2.4; max-width: 92vw; min-width: 0; width: 100%; }
    .card img { width: 38%; }
  }
</style>
</head>
<body>
<h1>✨ 시계를 골라봐 ✨</h1>
<div class="cards">
  <a class="card teenie" href="teenieping.html">
    <img src="img_teenieping/TP-001_하츄핑.webp" alt="티니핑 시계" draggable="false">
    <div class="card-label">티니핑 시계</div>
    <div class="card-sub">하츄핑과 친구들이 시계가 되어줘</div>
  </a>
  <a class="card pokemon" href="pokemon.html">
    <img src="img_pokemon/1세대/포켓몬이미지_0025_피카츄.webp" alt="포켓몬 시계" draggable="false">
    <div class="card-label">포켓몬 시계</div>
    <div class="card-sub">9세대 1,025마리 도감과 함께</div>
  </a>
  <a class="card solar" href="solar.html">
    <img src="img_solar/SS-08_토성.webp" alt="태양계 시계" draggable="false">
    <div class="card-label">태양계 시계</div>
    <div class="card-sub">별과 행성이 그리는 시간</div>
  </a>
</div>
<script>
  // 떠다니는 하트 + 포켓볼 + 별/행성 이모지
  var symbols = ['💗','💖','💕','✨','⚪','🔴','🪐','🌟','⭐','☄️','💫'];
  for (var i = 0; i < 16; i++) {
    var el = document.createElement('div');
    el.className = 'floating';
    el.textContent = symbols[Math.floor(Math.random() * symbols.length)];
    el.style.left = (Math.random() * 100) + 'vw';
    el.style.fontSize = (16 + Math.random() * 22) + 'px';
    el.style.animationDuration = (10 + Math.random() * 10) + 's';
    el.style.animationDelay = (Math.random() * -20) + 's';
    document.body.appendChild(el);
  }
</script>
</body>
</html>
