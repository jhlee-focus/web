<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<title>티니핑 디저트 가게</title>
<style>
  :root {
    --bg-soft: #FFF5F7;
    --bg-cream: #FFFAF0;
    --primary: #FF8FAB;
    --primary-dark: #E96A8A;
    --secondary: #9FE2BF;
    --accent: #FFD93D;
    --text: #5C3A21;
    --shadow: 0 4px 12px rgba(92, 58, 33, 0.15);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', system-ui, sans-serif;
    color: var(--text);
    background: var(--bg-soft);
    user-select: none;
    -webkit-user-select: none;
    touch-action: manipulation;
  }

  body {
    background-image: url('img_assets/Kitchen Interior Backgrounds/kitchen interior background 1.png');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
  }

  .game-root {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .game-frame {
    position: relative;
    width: 100%;
    height: 100%;
    max-width: 480px;
    max-height: 100vh;
    background: rgba(255, 245, 247, 0.85);
    backdrop-filter: blur(2px);
    overflow: hidden;
    box-shadow: var(--shadow);
  }

  /* Screen system */
  .screen {
    position: absolute;
    inset: 0;
    display: none;
    flex-direction: column;
    padding: 16px;
    padding-top: 56px;
  }
  .screen.active { display: flex; }

  /* Header (home + guide avatar) */
  .top-bar {
    position: absolute;
    top: 8px;
    left: 8px;
    right: 8px;
    height: 48px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 5;
    pointer-events: none;
  }
  .top-bar > * { pointer-events: auto; }

  .home-btn {
    width: 44px; height: 44px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.9);
    border: none;
    font-size: 22px;
    cursor: pointer;
    box-shadow: var(--shadow);
    display: flex; align-items: center; justify-content: center;
  }

  .guide-avatar {
    display: flex; align-items: center; gap: 6px;
    background: rgba(255, 255, 255, 0.9);
    border-radius: 24px;
    padding: 4px 12px 4px 4px;
    border: none;
    cursor: pointer;
    box-shadow: var(--shadow);
    font-size: 14px;
    color: var(--text);
    font-weight: 600;
  }
  .guide-avatar img {
    width: 36px; height: 36px;
    border-radius: 50%;
    object-fit: cover;
    background: var(--primary);
  }

  /* Character bubble (left) */
  .character-bubble {
    position: absolute;
    top: 64px;
    left: 8px;
    z-index: 4;
    display: flex;
    align-items: flex-end;
    gap: 8px;
    max-width: 80%;
    pointer-events: none;
  }
  .character-bubble img.guide-img {
    width: 72px; height: 72px;
    object-fit: contain;
    flex-shrink: 0;
  }
  .speech-bubble {
    background: white;
    border-radius: 18px;
    padding: 10px 14px;
    font-size: 16px;
    font-weight: 600;
    box-shadow: var(--shadow);
    max-width: 220px;
    position: relative;
  }
  .speech-bubble::before {
    content: '';
    position: absolute;
    left: -8px;
    bottom: 14px;
    border: 8px solid transparent;
    border-right-color: white;
    border-left: 0;
  }

  /* Buttons */
  button, .tap-target {
    min-width: 60px; min-height: 60px;
    border-radius: 22px;
    font-size: 22px;
    font-weight: 700;
    background: var(--primary);
    color: white;
    border: none;
    cursor: pointer;
    box-shadow: var(--shadow);
    transition: transform 0.08s;
    font-family: inherit;
  }
  button:active, .tap-target:active { transform: scale(0.95); }
  button.secondary { background: var(--secondary); color: var(--text); }
  button.accent { background: var(--accent); color: var(--text); }

  .big-btn {
    padding: 18px 32px;
    font-size: 26px;
    border-radius: 32px;
  }

  /* Start screen */
  #screen-start {
    align-items: center;
    justify-content: center;
    text-align: center;
  }
  #screen-start h1 {
    font-size: 38px;
    color: var(--primary-dark);
    text-shadow: 2px 2px 0 white, 4px 4px 12px rgba(0,0,0,0.1);
    margin-bottom: 16px;
    line-height: 1.3;
  }
  #screen-start .start-character {
    width: 200px; height: 200px;
    margin: 16px 0;
    object-fit: contain;
    animation: bounce 2s ease-in-out infinite;
  }
  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-12px); }
  }

  /* Collection screen */
  #screen-collection {
    align-items: center;
    overflow-y: auto;
    gap: 6px;
  }
  .collection-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    width: 100%;
    padding: 4px 4px 8px;
  }
  .collection-card {
    padding: 10px 6px;
    background: white;
    border-radius: 16px;
    box-shadow: var(--shadow);
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .collection-card img {
    width: 70px;
    height: 70px;
    object-fit: contain;
    image-rendering: pixelated;
  }
  .collection-card.locked img {
    filter: grayscale(1) brightness(0.4);
    opacity: 0.5;
  }
  .collection-card .name {
    font-size: 14px;
    font-weight: 800;
    color: var(--primary-dark);
  }
  .collection-card.locked .name { color: #888; }
  .collection-card .stats {
    font-size: 11px;
    color: var(--text);
  }

  /* Dessert select screen */
  #screen-dessert-select {
    align-items: center;
    gap: 12px;
    overflow-y: auto;
  }
  #screen-dessert-select h2 {
    font-size: 24px;
    margin-bottom: 4px;
    flex-shrink: 0;
  }
  .dessert-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
    width: 100%;
    padding: 8px 4px 16px;
  }
  .dessert-card {
    padding: 10px 8px;
    background: white;
    border-radius: 20px;
    box-shadow: var(--shadow);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    border: 4px solid transparent;
    transition: all 0.15s;
    position: relative;
  }
  .dessert-card:active {
    transform: scale(0.95);
    border-color: var(--primary);
  }
  .dessert-card img.dessert-img {
    width: 90px; height: 90px;
    object-fit: contain;
    image-rendering: pixelated;
  }
  .dessert-card .name {
    font-size: 16px;
    font-weight: 800;
    color: var(--primary-dark);
    text-align: center;
  }
  .dessert-card .best-stars {
    position: absolute;
    top: 6px;
    right: 8px;
    font-size: 12px;
    background: var(--accent);
    color: var(--text);
    padding: 2px 6px;
    border-radius: 10px;
    font-weight: 800;
  }
  .dessert-card .play-count {
    position: absolute;
    top: 6px;
    left: 8px;
    font-size: 11px;
    background: var(--secondary);
    color: var(--text);
    padding: 2px 6px;
    border-radius: 10px;
    font-weight: 700;
  }

  /* Ingredients screen */
  .progress-dots {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin: 8px 0 12px;
  }
  .progress-dots .dot {
    width: 14px; height: 14px;
    border-radius: 50%;
    background: rgba(255, 143, 171, 0.3);
    transition: background 0.2s, transform 0.2s;
  }
  .progress-dots .dot.done {
    background: var(--primary);
    transform: scale(1.2);
  }

  .bowl-area {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  .bowl-area img.bowl {
    width: 220px; height: 220px;
    object-fit: contain;
    image-rendering: pixelated;
  }
  .ingredients-in-bowl {
    position: absolute;
    inset: 0;
    pointer-events: none;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
    flex-wrap: wrap;
    max-width: 60%;
    margin: auto;
    bottom: 30%;
  }
  .ingredients-in-bowl span {
    font-size: 32px;
    animation: drop 0.4s ease-out;
  }
  .ingredients-in-bowl img.ing-drop {
    width: 44px;
    height: 44px;
    object-fit: contain;
    image-rendering: pixelated;
    animation: drop 0.4s ease-out;
  }
  @keyframes drop {
    0% { transform: translateY(-80px) scale(1.4); opacity: 0; }
    100% { transform: translateY(0) scale(1); opacity: 1; }
  }

  .ingredient-palette {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    padding: 10px;
    background: rgba(255, 255, 255, 0.9);
    border-radius: 20px;
    box-shadow: var(--shadow);
  }
  .ingredient-btn {
    aspect-ratio: 1;
    background: var(--bg-cream);
    border: 3px solid transparent;
    border-radius: 16px;
    font-size: 36px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: var(--text);
    padding: 4px;
    min-width: 0;
    min-height: 0;
  }
  .ingredient-btn .label {
    font-size: 11px;
    font-weight: 700;
    margin-top: 2px;
  }
  .ingredient-btn img.ing-icon {
    width: 56px;
    height: 56px;
    object-fit: contain;
    image-rendering: pixelated;
  }
  .ingredient-btn.used {
    opacity: 0.35;
    pointer-events: none;
    background: #eee;
  }
  .ingredient-btn.glow {
    border-color: var(--accent);
    box-shadow: 0 0 0 4px rgba(255, 217, 61, 0.4);
  }

  /* Tool screens (mix, bake, cream) */
  .tool-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    position: relative;
  }
  .tool-area img.tool {
    width: 220px;
    object-fit: contain;
    image-rendering: pixelated;
    cursor: pointer;
  }
  .tool-area .stack {
    position: relative;
    width: 240px;
    height: 240px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .tool-area .stack .bowl {
    width: 220px;
    image-rendering: pixelated;
    position: absolute;
    bottom: 0;
  }
  .tool-area .stack .spoon {
    width: 130px;
    image-rendering: pixelated;
    position: absolute;
    top: 0; right: 30px;
    transform-origin: bottom left;
  }
  .tool-area .stack.shaking .spoon {
    animation: stir 0.3s;
  }
  @keyframes stir {
    0% { transform: rotate(0); }
    50% { transform: rotate(-20deg); }
    100% { transform: rotate(0); }
  }
  .tool-area .stack.shaking .bowl {
    animation: shake 0.2s;
  }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-4px); }
    75% { transform: translateX(4px); }
  }

  .gauge {
    width: 70%;
    height: 22px;
    background: rgba(255, 255, 255, 0.9);
    border-radius: 12px;
    overflow: hidden;
    box-shadow: var(--shadow);
  }
  .gauge-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--accent), var(--primary));
    transition: width 0.2s;
  }

  /* Bake screen */
  .oven-wrap {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .oven-wrap .smoke {
    position: absolute;
    top: -40px;
    width: 30px; height: 30px;
    border-radius: 50%;
    background: rgba(180, 180, 180, 0.6);
    pointer-events: none;
    opacity: 0;
  }
  .oven-wrap.cooking .smoke {
    animation: smoke 1.5s ease-out;
  }
  @keyframes smoke {
    0% { opacity: 0; transform: translateY(0) scale(0.5); }
    50% { opacity: 1; }
    100% { opacity: 0; transform: translateY(-80px) scale(2); }
  }

  /* Decorate screen */
  #screen-decorate {
    padding-bottom: 0;
  }
  .decorate-canvas {
    flex: 1;
    background: white;
    border-radius: 24px;
    box-shadow: var(--shadow);
    position: relative;
    overflow: hidden;
    margin: 8px 0;
    cursor: crosshair;
  }
  .decorate-canvas .cake {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 70%;
    object-fit: contain;
    image-rendering: pixelated;
    pointer-events: none;
  }
  .placed-topping {
    position: absolute;
    font-size: 36px;
    transform: translate(-50%, -50%);
    pointer-events: none;
    animation: pop 0.3s ease-out;
  }
  @keyframes pop {
    0% { transform: translate(-50%, -50%) scale(0); }
    50% { transform: translate(-50%, -50%) scale(1.3); }
    100% { transform: translate(-50%, -50%) scale(1); }
  }

  .topping-palette {
    display: flex;
    gap: 8px;
    padding: 10px;
    background: rgba(255, 255, 255, 0.95);
    border-radius: 20px 20px 0 0;
    overflow-x: auto;
    align-items: center;
  }
  .topping-btn {
    flex-shrink: 0;
    width: 56px; height: 56px;
    border-radius: 14px;
    background: var(--bg-cream);
    border: 3px solid transparent;
    font-size: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    min-width: 56px;
    min-height: 56px;
  }
  .topping-btn.selected {
    border-color: var(--primary);
    background: white;
    transform: scale(1.05);
  }

  .decorate-actions {
    display: flex;
    gap: 8px;
    padding: 8px 0 12px;
  }
  .decorate-actions button {
    flex: 1;
    padding: 14px;
    font-size: 20px;
  }

  /* Complete screen */
  #screen-complete {
    align-items: center;
    justify-content: center;
    text-align: center;
    gap: 16px;
  }
  #screen-complete .final-img {
    width: 220px; height: 220px;
    object-fit: contain;
    image-rendering: pixelated;
    animation: pop 0.6s ease-out;
  }
  .final-canvas-wrap {
    position: relative;
    width: 240px; height: 240px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .final-canvas-wrap .placed-topping {
    pointer-events: none;
  }
  .stars {
    display: flex;
    gap: 12px;
    font-size: 48px;
  }
  .stars span {
    opacity: 0;
    transform: scale(0);
    transition: all 0.3s ease-out;
  }
  .stars span.show {
    opacity: 1;
    transform: scale(1);
    animation: starPop 0.5s ease-out;
  }
  @keyframes starPop {
    0% { transform: scale(0) rotate(-180deg); }
    60% { transform: scale(1.4) rotate(20deg); }
    100% { transform: scale(1) rotate(0); }
  }

  .praise {
    font-size: 26px;
    font-weight: 800;
    color: var(--primary-dark);
    background: white;
    padding: 14px 22px;
    border-radius: 24px;
    box-shadow: var(--shadow);
  }

  .complete-buttons {
    display: flex;
    flex-direction: column;
    gap: 10px;
    width: 80%;
  }

  /* Particles */
  .particle-layer {
    position: absolute;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
    z-index: 10;
  }
  .particle {
    position: absolute;
    font-size: 24px;
    animation: float 2s ease-out forwards;
  }
  @keyframes float {
    0% { opacity: 1; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-200px) scale(1.5) rotate(180deg); }
  }

  /* Modal */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 20px;
  }
  .modal-backdrop.active { display: flex; }
  .modal {
    background: white;
    border-radius: 24px;
    padding: 24px;
    max-width: 360px;
    width: 100%;
    box-shadow: 0 12px 40px rgba(0,0,0,0.3);
    text-align: center;
  }
  .modal h3 {
    font-size: 22px;
    color: var(--primary-dark);
    margin-bottom: 12px;
  }
  .modal input[type="text"] {
    width: 100%;
    padding: 14px;
    font-size: 20px;
    border: 3px solid var(--primary);
    border-radius: 14px;
    margin: 12px 0;
    font-family: inherit;
    text-align: center;
    color: var(--text);
    outline: none;
  }
  .modal-buttons {
    display: flex;
    gap: 8px;
    margin-top: 12px;
  }
  .modal-buttons button {
    flex: 1;
    padding: 14px;
    font-size: 18px;
  }

  /* Guide finger */
  .guide-finger {
    position: absolute;
    font-size: 36px;
    pointer-events: none;
    z-index: 20;
    animation: bouncePoint 1s ease-in-out infinite;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
  }
  @keyframes bouncePoint {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }

  /* Rotate notice */
  #screen-rotate {
    display: none;
    position: fixed;
    inset: 0;
    background: var(--bg-soft);
    z-index: 200;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    text-align: center;
    padding: 20px;
    gap: 16px;
  }
  #screen-rotate .icon {
    font-size: 64px;
    animation: rotateHint 2s ease-in-out infinite;
  }
  @keyframes rotateHint {
    0%, 100% { transform: rotate(0); }
    50% { transform: rotate(-90deg); }
  }
  #screen-rotate p {
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
  }
  @media (orientation: landscape) and (max-height: 500px) {
    #screen-rotate { display: flex; }
    .game-root { display: none; }
  }
</style>
</head>
<body>

<!-- Rotate notice -->
<div id="screen-rotate">
  <div class="icon">📱</div>
  <p>폰을 세워주세요!</p>
</div>

<!-- Game root -->
<div class="game-root">
  <div class="game-frame">

    <!-- Top bar (shared) -->
    <div class="top-bar">
      <button class="guide-avatar" id="guide-avatar-btn">
        <img id="guide-avatar-img" src="img_assets/teenieping_imgs/TP-001_하츄핑.webp" alt="안내" />
        <span>바꾸기</span>
      </button>
      <button class="home-btn" id="home-btn" aria-label="홈">🏠</button>
    </div>

    <!-- Character bubble (shared, hidden by default) -->
    <div class="character-bubble" id="character-bubble" style="display: none;">
      <img class="guide-img" id="guide-img" src="img_assets/teenieping_imgs/TP-001_하츄핑.webp" alt="" />
      <div class="speech-bubble" id="speech-bubble">안녕!</div>
    </div>

    <!-- 1. Start screen -->
    <div class="screen active" id="screen-start">
      <h1>티니핑<br>디저트 가게</h1>
      <img class="start-character" id="start-character-img" src="img_assets/teenieping_imgs/TP-001_하츄핑.webp" alt="캐릭터" />
      <button class="big-btn" id="start-btn">시작하기</button>
      <button class="big-btn secondary" id="collection-btn" style="margin-top:12px;">📖 나의 도감</button>
    </div>

    <!-- 1b. Collection screen -->
    <div class="screen" id="screen-collection">
      <h2 style="font-size:24px; color:var(--primary-dark); margin-bottom:6px;">나의 디저트 도감</h2>
      <div id="collection-summary" style="font-size:14px; font-weight:700; margin-bottom:8px; text-align:center;"></div>
      <div class="collection-grid" id="collection-grid"></div>
      <button class="big-btn accent" id="collection-back-btn" style="margin-top:8px;">🏠 처음으로</button>
    </div>

    <!-- 2. Dessert select screen -->
    <div class="screen" id="screen-dessert-select">
      <h2>무엇을 만들까?</h2>
      <div class="dessert-grid" id="dessert-grid"></div>
    </div>

    <!-- 3. Ingredients screen -->
    <div class="screen" id="screen-ingredients">
      <div class="progress-dots" id="progress-dots"></div>
      <div class="bowl-area">
        <img class="bowl" src="img_assets/tools_pixel/Deep Mixing Bowl.png" alt="그릇" />
        <div class="ingredients-in-bowl" id="ingredients-in-bowl"></div>
      </div>
      <div class="ingredient-palette" id="ingredient-palette"></div>
    </div>

    <!-- 4. Mix screen -->
    <div class="screen" id="screen-mix">
      <div class="tool-area" id="mix-area">
        <div class="stack" id="mix-stack">
          <img class="bowl" src="img_assets/tools_pixel/Deep Mixing Bowl.png" alt="그릇" />
          <img class="spoon" src="img_assets/tools_pixel/Wooden Spoon.png" alt="스푼" />
        </div>
        <div class="gauge"><div class="gauge-fill" id="mix-gauge"></div></div>
      </div>
    </div>

    <!-- 5. Add chocochip (cookie only) -->
    <div class="screen" id="screen-add-chocochip">

// ============================================================

const $  = sel => document.querySelector(sel);
const $$ = sel => document.querySelectorAll(sel);

function showScreen(id) {
  $$('.screen').forEach(s => s.classList.remove('active'));
  const target = document.getElementById(id);
  if (target) target.classList.add('active');
  state.currentScreen = id;
  hideGuideFinger();
  hideBubble();
  resetIdleTimer();
}

function showBubble(text) {
  const bubble = $('#character-bubble');
  $('#guide-img').src = state.guideSrc;
  $('#speech-bubble').textContent = text;
  bubble.style.display = 'flex';
}
function hideBubble() {
  $('#character-bubble').style.display = 'none';
}
function say(text) {
  showBubble(text);
}

function showGuideFinger(targetEl, offsetX = 0, offsetY = -50) {
  if (!targetEl) return;
  const rect = targetEl.getBoundingClientRect();
  const frame = $('.game-frame').getBoundingClientRect();
  const finger = $('#guide-finger');
  finger.style.left = (rect.left - frame.left + rect.width / 2 - 18 + offsetX) + 'px';
  finger.style.top  = (rect.top  - frame.top  + offsetY) + 'px';
  finger.style.display = 'block';
}
function hideGuideFinger() {
  $('#guide-finger').style.display = 'none';
}

function resetIdleTimer() {
  clearTimeout(state.idleTimer);
  state.idleTimer = setTimeout(() => triggerIdleHint(), IDLE_HINT_MS);
}

function triggerIdleHint() {
  // Each screen registers its own idle hint via `state._currentIdleHint`
  if (typeof state._currentIdleHint === 'function') state._currentIdleHint();
}

function setIdleHint(fn) {
  state._currentIdleHint = fn;
  resetIdleTimer();
}

function shake(el, ms = 200) {
  el.classList.add('shake');
  setTimeout(() => el.classList.remove('shake'), ms);
}

function spawnParticles(layer, count = 30) {
  const symbols = ['✨','⭐','💖','🌟','💕'];
  for (let i = 0; i < count; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.textContent = symbols[Math.floor(Math.random() * symbols.length)];
    p.style.left = Math.random() * 100 + '%';
    p.style.top  = (60 + Math.random() * 40) + '%';
    p.style.animationDelay = (Math.random() * 0.5) + 's';
    layer.appendChild(p);
    setTimeout(() => p.remove(), 2500);
  }
}

function refreshGuideUi() {
  $('#guide-avatar-img').src = state.guideSrc;

}

function openCharacterModal() {
  const modal = $('#modal-character');
  const input = $('#character-input');
  input.value = '';
  modal.classList.add('active');
  setTimeout(() => input.focus(), 100);
}
function closeCharacterModal() {
  $('#modal-character').classList.remove('active');
}
function tryChangeGuide() {
  const raw = $('#character-input').value.trim();
  if (!raw) { closeCharacterModal(); return; }
  let key = raw;
  if (TEENIEPINGS[key]) { applyGuide(key); return; }
  const withSuffix = key.endsWith('핑') ? key : key + '핑';
  if (TEENIEPINGS[withSuffix]) { applyGuide(withSuffix); return; }
  // partial match (substring)
  const found = Object.keys(TEENIEPINGS).find(n => n.includes(key));
  if (found) { applyGuide(found); return; }
  // not found
  closeCharacterModal();
  say(`'${raw}' 친구는 아직 못 찾았어! 하츄핑이랑 같이 놀자!`);
  setTimeout(hideBubble, 2500);
}
function applyGuide(name) {
  state.guideName = name;
  state.guideSrc = TEENIEPINGS[name];
  refreshGuideUi();
  closeCharacterModal();
  say(`안녕! 나는 ${name}이야!`);
  setTimeout(hideBubble, 2500);
}

function setupStart() {
  $('#start-btn').addEventListener('click', () => {
    getAudioCtx(); // unlock audio on first user gesture
    Sounds.glide();
    showScreen('screen-dessert-select');
    setupDessertSelect();
  });

  $('#collection-btn').addEventListener('click', () => {
    getAudioCtx();
    Sounds.pop();
    renderCollection();
    showScreen('screen-collection');
  });

  $('#collection-back-btn').addEventListener('click', () => {
    Sounds.tap();
    showScreen('screen-start');
    setIdleHint(() => showGuideFinger($('#start-btn')));
  });

  $('#guide-avatar-btn').addEventListener('click', openCharacterModal);
  $('#home-btn').addEventListener('click', openHomeModal);

  $('#character-cancel').addEventListener('click', closeCharacterModal);
  $('#character-confirm').addEventListener('click', tryChangeGuide);
  $('#character-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') tryChangeGuide();
  });

  $('#home-cancel').addEventListener('click', closeHomeModal);
  $('#home-confirm').addEventListener('click', goHome);

  setIdleHint(() => showGuideFinger($('#start-btn')));
}

function renderCollection() {
  const grid = $('#collection-grid');
  grid.innerHTML = '';
  let totalCount = 0;
  let madeKeys = 0;
  const totalDesserts = Object.keys(DESSERTS).length;
  Object.entries(DESSERTS).forEach(([key, d]) => {
    const stats = getCollectionStats(key);
    if (stats.count > 0) madeKeys++;
    totalCount += stats.count;
    const card = document.createElement('div');
    card.className = 'collection-card' + (stats.count === 0 ? ' locked' : '');
    const statText = stats.count > 0
      ? `${stats.count}회 · ${'⭐'.repeat(stats.bestStars)}`
      : '아직 안 만들었어';
    card.innerHTML = `
      <img src="${d.finalImg}" alt="${d.name}" onerror="this.style.opacity='0.2'" />
      <div class="name">${stats.count > 0 ? d.name : '???'}</div>
      <div class="stats">${statText}</div>
    `;
    grid.appendChild(card);
  });
  $('#collection-summary').textContent =
    `${madeKeys}/${totalDesserts}개 발견 · 총 ${totalCount}개 만들었어!`;
}

function getAudioCtx() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    catch (e) { soundEnabled = false; }
  }
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}
function playTone(opts) {
  if (!soundEnabled) return;
  const ctx = getAudioCtx();
  if (!ctx) return;
  const { freq = 440, duration = 0.15, type = 'sine', volume = 0.25, slide = null, attack = 0.005 } = opts;
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.connect(gain); gain.connect(ctx.destination);
  osc.type = type;
  osc.frequency.value = freq;
  if (slide) osc.frequency.linearRampToValueAtTime(slide, ctx.currentTime + duration);
  const t = ctx.currentTime;
  gain.gain.setValueAtTime(0, t);
  gain.gain.linearRampToValueAtTime(volume, t + attack);
  gain.gain.exponentialRampToValueAtTime(0.001, t + duration);
  osc.start(t);
  osc.stop(t + duration + 0.05);
}
const Sounds = {
  tap:   () => playTone({ freq: 1200, duration: 0.06, type: 'sine', volume: 0.15 }),
  pop:   () => playTone({ freq: 800,  duration: 0.1,  type: 'sine', volume: 0.2 }),
  drop:  () => playTone({ freq: 600,  duration: 0.25, type: 'sine', slide: 200, volume: 0.3 }),
  mix:   () => playTone({ freq: 250 + Math.random() * 100, duration: 0.12, type: 'square', volume: 0.08 }),
  bake:  () => {
    playTone({ freq: 80, duration: 1.5, type: 'sawtooth', volume: 0.04 });
    setTimeout(() => playTone({ freq: 1400, duration: 0.3, type: 'sine', slide: 900, volume: 0.25 }), 1500);
  },
  star:  () => playTone({ freq: 1200, duration: 0.4, type: 'sine', slide: 2000, volume: 0.3 }),
  cheer: () => {
    [523, 659, 784, 1047, 1319].forEach((f, i) => {
      setTimeout(() => playTone({ freq: f, duration: 0.22, type: 'sine', volume: 0.2 }), i * 90);
    });
  },
  error: () => playTone({ freq: 180, duration: 0.18, type: 'sawtooth', volume: 0.12 }),
  glide: () => {
    const ctx = getAudioCtx();
    if (!ctx) return;
    [400, 600, 800].forEach((f, i) => {
      setTimeout(() => playTone({ freq: f, duration: 0.1, type: 'sine', volume: 0.15 }), i * 80);
    });
  }
};

// ============================================================
// COLLECTION (localStorage) + STAR TIER
// ============================================================
const COLLECTION_KEY = 'teenieping_collection_v1';
function loadCollection() {
  try {
    const raw = localStorage.getItem(COLLECTION_KEY);
    return raw ? JSON.parse(raw) : {};
  } catch (e) { return {}; }
}
function saveCollection(data) {
  try { localStorage.setItem(COLLECTION_KEY, JSON.stringify(data)); } catch (e) {}
}
function getCollectionStats(dessertKey) {
  const c = loadCollection();
  return c[dessertKey] || { count: 0, bestStars: 0, lastPlayed: null };
}
function recordPlay(dessertKey, stars) {
  const c = loadCollection();
  const cur = c[dessertKey] || { count: 0, bestStars: 0, lastPlayed: null };
  cur.count++;
  cur.bestStars = Math.max(cur.bestStars, stars);
  cur.lastPlayed = Date.now();
  c[dessertKey] = cur;
  saveCollection(c);
}
function calculateStars(toppingCount) {
  if (toppingCount <= 2) return 1;
  if (toppingCount <= 5) return 2;
  return 3;
}

// ============================================================
// SCREEN: DESSERT SELECT
// ============================================================
function setupDessertSelect() {
  const grid = $('#dessert-grid');
  grid.innerHTML = '';
  Object.entries(DESSERTS).forEach(([key, d]) => {
    const card = document.createElement('div');
    card.className = 'dessert-card';
    card.dataset.dessert = key;
    const stats = getCollectionStats(key);
    const playBadge = stats.count > 0 ? `<div class="play-count">${stats.count}회</div>` : '';
    const starBadge = stats.bestStars > 0 ? `<div class="best-stars">${'⭐'.repeat(stats.bestStars)}</div>` : '';
    card.innerHTML = `
      ${playBadge}
      ${starBadge}
      <img class="dessert-img" src="${d.finalImg}" alt="${d.name}" />
      <div class="name">${d.name}</div>
    `;
    card.onclick = () => {
      Sounds.pop();
      state.currentDessert = key;
      state.selectedIngredients = [];
      state.placedToppings = [];
      startIngredientsScreen();
    };
    grid.appendChild(card);
  });
  setIdleHint(() => {
    const first = $('#dessert-grid .dessert-card');
    if (first) showGuideFinger(first);
  });
}

// ============================================================
// SCREEN: INGREDIENTS
// ============================================================
function startIngredientsScreen() {
  showScreen('screen-ingredients');
  const dessert = DESSERTS[state.currentDessert];
  const palette = $('#ingredient-palette');
  palette.innerHTML = '';
  const inBowl = $('#ingredients-in-bowl');
  inBowl.innerHTML = '';

  // Build palette: dessert ingredients + 2 distractors
  const allKeys = Object.keys(INGREDIENTS).filter(k => k !== 'choco_chip' && k !== 'cream');
  const distractors = allKeys.filter(k => !dessert.ingredients.includes(k)).slice(0, 2);
  const paletteKeys = [...dessert.ingredients, ...distractors];
  // shuffle
  paletteKeys.sort(() => Math.random() - 0.5);

  paletteKeys.forEach(k => {
    const btn = document.createElement('button');
    btn.className = 'ingredient-btn';
    btn.dataset.ing = k;
    const ing = INGREDIENTS[k];
    btn.innerHTML = ing.img
      ? `<img class="ing-icon" src="${ing.img}" alt="${ing.name}" onerror="this.replaceWith(Object.assign(document.createElement('span'),{textContent:'${ing.emoji}',style:'font-size:36px'}))" /><span class="label">${ing.name}</span>`
      : `<span>${ing.emoji}</span><span class="label">${ing.name}</span>`;
    btn.onclick = () => onIngredientTap(k, btn);
    palette.appendChild(btn);
  });

  renderProgressDots();
  say(`${INGREDIENTS[dessert.ingredients[0]].name}을(를) 골라줘!`);

  setIdleHint(() => {
    const dessert = DESSERTS[state.currentDessert];
    const next = dessert.ingredients[state.selectedIngredients.length];
    if (!next) return;
    const btn = palette.querySelector(`[data-ing="${next}"]`);
    if (btn) {
      btn.classList.add('glow');
      showGuideFinger(btn);
    }
  });
}

function renderProgressDots() {
  const dots = $('#progress-dots');
  const total = DESSERTS[state.currentDessert].ingredients.length;
  dots.innerHTML = '';
  for (let i = 0; i < total; i++) {
    const d = document.createElement('div');
    d.className = 'dot' + (i < state.selectedIngredients.length ? ' done' : '');
    dots.appendChild(d);
  }
}

function onIngredientTap(ingKey, btn) {
  const dessert = DESSERTS[state.currentDessert];
  const expected = dessert.ingredients[state.selectedIngredients.length];
  if (ingKey !== expected) {
    Sounds.error();
    shake(btn);
    say('이건 다음에 써보자!');
    setTimeout(hideBubble, 1500);
    return;
  }
  // correct
  Sounds.drop();
  state.selectedIngredients.push(ingKey);
  btn.classList.add('used');
  btn.classList.remove('glow');
  hideGuideFinger();

  // Drop animation in bowl
  const ingData = INGREDIENTS[ingKey];
  let drop;
  if (ingData.img) {
    drop = document.createElement('img');
    drop.src = ingData.img;
    drop.alt = ingData.name;
    drop.className = 'ing-drop';
    drop.onerror = () => {
      const span = document.createElement('span');
      span.textContent = ingData.emoji;
      drop.replaceWith(span);
    };
  } else {
    drop = document.createElement('span');
    drop.textContent = ingData.emoji;
  }
  $('#ingredients-in-bowl').appendChild(drop);

  renderProgressDots();

  if (state.selectedIngredients.length === dessert.ingredients.length) {
    say('잘했어! 이제 섞어보자!');
    setTimeout(() => {
      hideBubble();
      startMixScreen();
    }, 1400);
  } else {
    const nextKey = dessert.ingredients[state.selectedIngredients.length];
    say(`${INGREDIENTS[nextKey].name}을(를) 골라줘!`);
    setIdleHint(() => {
      const next = $(`#ingredient-palette [data-ing="${nextKey}"]`);
      if (next) {
        next.classList.add('glow');
        showGuideFinger(next);
      }
    });
  }
}

// ============================================================
// SCREEN: MIX (repeat tap)
// ============================================================
function startMixScreen() {
  showScreen('screen-mix');
  const stack = $('#mix-stack');
  const gauge = $('#mix-gauge');
  let count = 0;
  gauge.style.width = '0%';
  say('그릇을 톡톡 눌러서 섞어줘!');

  stack.onclick = () => {
    count++;
    Sounds.mix();
    stack.classList.add('shaking');
    setTimeout(() => stack.classList.remove('shaking'), 300);
    gauge.style.width = (count / REPEAT_TAPS_REQUIRED) * 100 + '%';
    if (count >= REPEAT_TAPS_REQUIRED) {
      Sounds.pop();
      stack.onclick = null;
      hideBubble();
      setTimeout(() => {
        const dessert = DESSERTS[state.currentDessert];
        if (dessert.needChocochip) startAddChocochipScreen();
        else startBakeScreen();
      }, 600);
    }
  };

  setIdleHint(() => showGuideFinger(stack));
}

// ============================================================
// SCREEN: ADD CHOCOCHIP (cookie only)
// ============================================================
function startAddChocochipScreen() {
  showScreen('screen-add-chocochip');
  const btn = $('#add-chocochip-btn');
  const pile = $('#chocochip-pile');
  pile.textContent = '';
  say('초코칩을 넣어줘!');

  btn.onclick = () => {
    Sounds.drop();
    btn.classList.add('used');
    const chipSrc = INGREDIENTS.choco_chip.img;
    pile.innerHTML = chipSrc
      ? `<img src="${chipSrc}" style="width:120px;height:120px;object-fit:contain;image-rendering:pixelated;" alt="초코칩" onerror="this.replaceWith(Object.assign(document.createElement('span'),{textContent:'🍫🍫🍫'}))" />`
      : '🍫🍫🍫';
    pile.style.animation = 'drop 0.5s ease-out';
    btn.onclick = null;
    setTimeout(() => {
      hideBubble();
      startBakeScreen();
    }, 1000);
  };

  setIdleHint(() => showGuideFinger(btn));
}

// ============================================================
// SCREEN: BAKE (auto)
// ============================================================
function startBakeScreen() {
  showScreen('screen-bake');
  const oven = $('#oven-img');
  const wrap = $('#oven-wrap');
  say('오븐을 눌러봐!');

  oven.onclick = () => {
    Sounds.bake();
    oven.onclick = null;
    wrap.classList.add('cooking');
    hideBubble();
    setTimeout(() => {
      wrap.classList.remove('cooking');
      const dessert = DESSERTS[state.currentDessert];
      if (dessert.needCream) startCreamScreen();
      else startDecorateScreen();
    }, AUTO_DURATION_MS);
  };

  setIdleHint(() => showGuideFinger(oven));
}

// ============================================================
// SCREEN: CREAM (cake only, repeat tap)
// ============================================================
function startCreamScreen() {
  showScreen('screen-cream');
  const stack = $('#cream-stack');
  const bag = $('#piping-bag');
  const gauge = $('#cream-gauge');
  const dessert = DESSERTS[state.currentDessert];
  $('#cake-base').src = dessert.finalImg;
  $('#cake-base').alt = dessert.name;
  let count = 0;
  gauge.style.width = '0%';
  const verb = state.currentDessert === 'donut' ? '글레이즈를 발라줘!' : '크림을 발라줘!';
  say('짤주머니로 ' + verb);

  bag.onclick = () => {
    count++;
    Sounds.pop();
    bag.style.transition = 'transform 0.15s';
    bag.style.transform = `rotate(${-15 + count * 5}deg)`;
    setTimeout(() => { bag.style.transform = 'rotate(0)'; }, 150);
    gauge.style.width = (count / REPEAT_TAPS_REQUIRED) * 100 + '%';
    if (count >= REPEAT_TAPS_REQUIRED) {
      bag.onclick = null;
      hideBubble();
      setTimeout(() => startDecorateScreen(), 500);
    }
  };

  setIdleHint(() => showGuideFinger(bag));
}

// ============================================================
// SCREEN: DECORATE (free placement)
// ============================================================
function startDecorateScreen() {
  showScreen('screen-decorate');
  const dessert = DESSERTS[state.currentDessert];
  const canvas = $('#decorate-canvas');
  const palette = $('#topping-palette');
  state.placedToppings = [];
  state.selectedTopping = null;

  // Set base dessert image
  $('#decorate-base').src = dessert.finalImg;

  // Clear previous toppings
  $$('#decorate-canvas .placed-topping').forEach(el => el.remove());

  // Build palette
  palette.innerHTML = '';
  dessert.toppings.forEach(t => {
    const b = document.createElement('button');
    b.className = 'topping-btn';
    b.textContent = TOPPING_EMOJI[t];
    b.dataset.topping = t;
    b.onclick = () => {
      $$('.topping-btn').forEach(x => x.classList.remove('selected'));
      b.classList.add('selected');
      state.selectedTopping = t;
      hideBubble();
    };
    palette.appendChild(b);
  });

  // Auto-select first topping
  const firstBtn = palette.querySelector('.topping-btn');
  if (firstBtn) {
    firstBtn.classList.add('selected');
    state.selectedTopping = dessert.toppings[0];
  }

  // Canvas tap = place topping
  canvas.onclick = e => {
    if (!state.selectedTopping) return;
    Sounds.tap();
    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;
    placeTopping(canvas, x, y, state.selectedTopping, true);
  };

  $('#undo-btn').onclick = () => {
    const last = state.placedToppings.pop();
    if (last && last.el) last.el.remove();
  };

  $('#finish-btn').onclick = () => {
    canvas.onclick = null;
    startCompleteScreen();
  };

  say('마음대로 꾸며봐! 토핑을 고르고 케이크 위를 톡 누르면 돼!');

  setIdleHint(() => {
    if (state.placedToppings.length === 0) {
      showGuideFinger($('#finish-btn'));
    }
  });
}

function placeTopping(canvas, x, y, type, recordRel) {
  const el = document.createElement('div');
  el.className = 'placed-topping';
  el.textContent = TOPPING_EMOJI[type];
  el.style.left = x + 'px';
  el.style.top  = y + 'px';
  canvas.appendChild(el);
  // Record relative for replay
  const rect = canvas.getBoundingClientRect();
  state.placedToppings.push({
    el,
    relX: x / rect.width,
    relY: y / rect.height,
    type
  });
}

// ============================================================
// SCREEN: COMPLETE
// ============================================================
function startCompleteScreen() {
  showScreen('screen-complete');
  const dessert = DESSERTS[state.currentDessert];
  const wrap = $('#final-canvas-wrap');
  // Clear previous
  $$('#final-canvas-wrap .placed-topping').forEach(el => el.remove());
  $('#final-img').src = dessert.finalImg;
  $('#final-img').style.display = 'block';

  // Replay placed toppings (scaled to final canvas size)
  setTimeout(() => {
    const finalRect = wrap.getBoundingClientRect();
    state.placedToppings.forEach(t => {
      const el = document.createElement('div');
      el.className = 'placed-topping';
      el.textContent = TOPPING_EMOJI[t.type];
      el.style.left = (t.relX * finalRect.width) + 'px';
      el.style.top  = (t.relY * finalRect.height) + 'px';
      el.style.fontSize = '28px';
      wrap.appendChild(el);
    });
  }, 50);

  // Reset stars
  ['#star-1','#star-2','#star-3'].forEach(s => {
    $(s).classList.remove('show');
    $(s).style.opacity = '0.2';
    $(s).style.filter = 'grayscale(0.7)';
  });

  // Star tier (1~3 by topping count)
  const earnedStars = calculateStars(state.placedToppings.length);
  recordPlay(state.currentDessert, earnedStars);

  // Particles
  const layer = $('#particle-layer');
  layer.innerHTML = '';
  spawnParticles(layer, 28);
  Sounds.cheer();

  // Stars sequential — only earned ones light up
  for (let i = 1; i <= 3; i++) {
    if (i <= earnedStars) {
      const el = $(`#star-${i}`);
      setTimeout(() => {
        el.style.opacity = '';
        el.style.filter = '';
        el.classList.add('show');
        Sounds.star();
        if (i === earnedStars && i === 3) spawnParticles(layer, 16);
      }, 400 + (i - 1) * 700);
    }
  }

  // Praise (more enthusiastic for higher stars)
  const praiseTier = earnedStars === 3
    ? ['최고야! 너무 예뻐!', '와아~ 진짜 멋져!', '완벽해! 사랑해!', '대박! 천재야!']
    : earnedStars === 2
      ? ['예쁘게 만들었네!', '잘했어!', '맛있겠다!', '또 만들어줘!']
      : ['고마워!', '귀엽다!', '잘했어!'];
  $('#praise-text').textContent = praiseTier[Math.floor(Math.random() * praiseTier.length)];

  // Buttons
  $('#again-same-btn').onclick = () => {
    state.selectedIngredients = [];
    state.placedToppings = [];
    startIngredientsScreen();
  };
  $('#again-other-btn').onclick = () => {
    state.currentDessert = null;
    state.selectedIngredients = [];
    state.placedToppings = [];
    showScreen('screen-dessert-select');
    setupDessertSelect();
  };
  $('#again-home-btn').onclick = goHome;
}

// ============================================================
// INIT
// ============================================================
function init() {
  refreshGuideUi();
  setupStart();
  // Reset idle on any tap
  document.addEventListener('click', resetIdleTimer, true);
  document.addEventListener('touchstart', resetIdleTimer, { passive: true, capture: true });
}

document.addEventListener('DOMContentLoaded', init);
</script>
