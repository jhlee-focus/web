<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<title>줄놀이 — 네온 손동작 트래킹</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: #000;
    color: #9ff;
    font-family: 'Courier New', Consolas, monospace;
  }
  /* 숨겨진 원본 <video>; p5 캔버스에 프레임을 직접 그려서 사용한다. */
  #cam { display: none; }
  #status {
    position: fixed;
    top: 12px;
    left: 14px;
    z-index: 10;
    font-size: 12px;
    letter-spacing: 0.08em;
    opacity: 0.7;
    text-shadow: 0 0 6px #0ff, 0 0 12px #0ff8;
    pointer-events: none;
    transition: opacity 0.8s ease;
  }
  #hud {
    position: fixed;
    top: 12px;
    right: 14px;
    z-index: 10;
    display: flex;
    align-items: center;
    gap: 12px;
    color: #dfffff;
    font-size: 11px;
    letter-spacing: 0.08em;
    opacity: 0.78;
    pointer-events: none;
    text-shadow: 0 0 6px #0ff, 0 0 12px #0ff8;
  }
  .hud-item {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    min-width: 22px;
  }
  .hud-dot {
    width: 7px;
    height: 7px;
    border: 1px solid #377;
    border-radius: 50%;
    background: #044;
    box-shadow: 0 0 4px #033;
    opacity: 0.48;
  }
  .hud-dot.active {
    border-color: #eff;
    background: #9ff;
    opacity: 1;
    box-shadow: 0 0 7px #0ff, 0 0 16px #0ff8;
  }
  #rightDot.active {
    background: #f6f;
    box-shadow: 0 0 7px #f6f, 0 0 16px #f6f8;
  }
  #modeControls {
    position: fixed;
    left: 50%;
    bottom: 18px;
    z-index: 20;
    display: inline-flex;
    gap: 2px;
    padding: 3px;
    border: 1px solid #1a8;
    background: rgba(0, 20, 24, 0.58);
    box-shadow: 0 0 14px #0ff4, inset 0 0 18px #033;
    transform: translateX(-50%);
  }
  #modeControls button {
    border: 0;
    background: transparent;
    color: #8dd;
    cursor: pointer;
    font: 700 11px/1 'Courier New', Consolas, monospace, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
    letter-spacing: 0.1em;
    padding: 9px 13px;
    text-shadow: 0 0 7px #0ff8;
  }
  #modeControls button.active {
    background: #9ff;
    color: #001719;
    box-shadow: 0 0 10px #0ff, 0 0 22px #0ff7;
    text-shadow: none;
  }
  /* ----- 한글 박수 게임 오버레이 ----- */
  #clapGameOverlay {
    position: fixed;
    inset: 0;
    z-index: 12;
    pointer-events: none;
    font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', 'Courier New', Consolas, sans-serif;
    color: #dff;
    transition: opacity 0.5s ease;
  }
  #clapGameOverlay.hidden { display: none; }
  #clapScoreBoard,
  #clapTimerBoard,
  #clapBestBoard {
    position: absolute;
    top: 54px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    letter-spacing: 0.18em;
    opacity: 0.92;
  }
  #clapScoreBoard { left: 26%; }
  #clapTimerBoard { left: 50%; transform: translateX(-50%); }
  #clapBestBoard { right: 22%; }
  #clapScoreBoard .clap-num {
    font-size: 40px;
    font-weight: 700;
    color: #9ff;
    text-shadow: 0 0 12px #0ff, 0 0 28px rgba(0, 255, 255, 0.55);
    font-variant-numeric: tabular-nums;
  }
  #clapTimerBoard .clap-num {
    font-size: 46px;
    font-weight: 700;
    color: #ffe89a;
    text-shadow: 0 0 12px #ff0, 0 0 28px rgba(255, 220, 60, 0.55);
    font-variant-numeric: tabular-nums;
  }
  #clapBestBoard .clap-num {
    font-size: 30px;
    font-weight: 700;
    color: #fcf;
    text-shadow: 0 0 10px #f6f, 0 0 22px rgba(255, 102, 255, 0.55);
    font-variant-numeric: tabular-nums;
  }
  #clapScoreBoard .clap-label,
  #clapTimerBoard .clap-label,
  #clapBestBoard .clap-label {
    text-shadow: 0 0 6px #0ff, 0 0 12px rgba(0, 255, 255, 0.5);
  }
  #clapPrompt {
    position: absolute;
    bottom: 22%;
    left: 50%;
    transform: translateX(-50%);
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 0.1em;
    padding: 10px 22px;
    background: rgba(0, 24, 28, 0.62);
    border: 1px solid #1a8;
    box-shadow: 0 0 14px rgba(0, 255, 255, 0.28), inset 0 0 18px #033;
    color: #efc;
    text-shadow: 0 0 8px #ff0, 0 0 18px rgba(255, 220, 80, 0.55);
    white-space: nowrap;
  }
  @media (max-width: 520px) {
    #hud {
      top: 36px;
      right: auto;
      left: 14px;
      gap: 8px;
      font-size: 10px;
    }
    #modeControls {
      bottom: 12px;
    }
    #modeControls button {
      padding: 8px 10px;
      font-size: 10px;
    }
    #clapScoreBoard { left: 10%; }
    #clapBestBoard { right: 8%; }
    #clapScoreBoard .clap-num { font-size: 28px; }
    #clapTimerBoard .clap-num { font-size: 34px; }
    #clapBestBoard .clap-num { font-size: 22px; }
    #clapPrompt { font-size: 13px; padding: 8px 14px; }
  }
  canvas { display: block; }
</style>
</head>
<body>
<!--
  로컬 실행:    python -m http.server 8000
  접속 주소:    http://localhost:8000/index.html
  (file:// 프로토콜로 직접 열면 대부분의 브라우저가 getUserMedia를 차단한다.)
-->
<div id="status">카메라 준비 중…</div>
<div id="hud" aria-live="polite">
  <span class="hud-item"><span id="leftDot" class="hud-dot"></span>좌</span>
  <span class="hud-item"><span id="rightDot" class="hud-dot"></span>우</span>
  <span id="fpsReadout" class="hud-item">-- 프레임</span>
  <span id="perfReadout" class="hud-item">높음</span>
</div>
<div id="modeControls" role="group" aria-label="시각화 모드">
  <button type="button" class="active" data-mode="strings" aria-pressed="true">줄놀이</button>
  <button type="button" data-mode="sphere" aria-pressed="false">구체</button>
  <button type="button" data-mode="clap" aria-pressed="false">한글 박수</button>
</div>
<div id="clapGameOverlay" class="hidden" aria-live="polite">
  <div id="clapScoreBoard">
    <span class="clap-label">점수</span>
    <span class="clap-num" id="clapScore">0</span>
  </div>
  <div id="clapTimerBoard">
    <span class="clap-label">남은 시간</span>
    <span class="clap-num" id="clapTimer">60.0</span>
  </div>
  <div id="clapBestBoard">
    <span class="clap-label">최고 기록</span>
    <span class="clap-num" id="clapBest">0</span>
  </div>
  <div id="clapPrompt">양손으로 박수쳐서 시작!</div>
</div>
<video id="cam" playsinline autoplay muted></video>

<script src="https://cdn.jsdelivr.net/npm/p5@1.9.4/lib/p5.min.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>

<script>
/* ===========================================================
   줄놀이 — 네온 손동작 트래킹 인스트루먼트
   p5.js (글로벌 모드) + MediaPipe Hands
   =========================================================== */

let videoEl;
let latestResults = null;

const FINGERTIPS = [4, 8, 12, 16, 20]; // 엄지, 검지, 중지, 약지, 새끼
const SPHERE_FINGERS = [8, 12, 16, 20]; // 검지~새끼 끝점이 구체를 잡아준다
const D_MIN = 60;   // px — 줄이 완전히 팽팽해지는 임계값
const D_MAX = 700;  // px — 줄이 끝까지 늘어났다고 간주하는 임계값
const SPHERE_D_MIN = 90;
const SPHERE_D_MAX = 760;
const SPHERE_R_MIN = 42;
const SPHERE_R_MAX = 300;

// 한 손만 인식될 때 행성(소형 구체)에 쓰는 임계값
const SOLO_SPREAD_MIN = 25;   // px — 손가락이 모인 정도(평균 반경 최소)
const SOLO_SPREAD_MAX = 160;  // px — 손가락이 활짝 펴진 정도(평균 반경 최대)
const SOLO_R_MIN = 30;
const SOLO_R_MAX = 170;

// 한글 박수 게임 튜닝값 — 판정 너그럽게: 반경 확대 + 3점 판정(중간점·좌손·우손)
const PALM_LANDMARK = 9;       // 중지 MCP 관절 = 손바닥 중심 근사
const CLAP_DIST = 145;         // px — 손바닥 간 거리가 이보다 가까우면 박수로 친다
const CLAP_RELEASE = 270;      // px — 이 거리 이상으로 벌어져야 다음 박수가 재무장된다
const HIT_RADIUS = 130;        // px — 박수 3점 중 하나라도 타깃 중심에서 이 안이면 명중
const GAME_DURATION = 60.0;    // 초 — 한 게임 길이
const TARGET_LIFETIME = 2.5;   // 초 — 타깃 하나가 화면에 머무는 총 시간
const TARGET_FADE_IN = 0.30;   // 초
const TARGET_FADE_OUT = 0.50;  // 초
const SPAWN_INTERVAL_BASE = 0.62; // 초 — 시작 시 스폰 간격
const SPAWN_INTERVAL_MIN = 0.32;  // 초 — 종반부에 도달하는 최소 스폰 간격
const SYLLABLE_PROBABILITY = 0.35; // 음절(3점) 비율, 나머지는 자모(1점)
const HIGH_SCORE_KEY = 'handTracking6_clapHighScore';
const RESTART_GRACE_MS = 1200; // 게임 종료 직후 자동 재시작 방지용 유예

// 게임에 등장하는 한글 자모(1점)와 음절(3점) 풀
const HANGUL_JAMO = [
  'ㄱ','ㄴ','ㄷ','ㄹ','ㅁ','ㅂ','ㅅ','ㅇ','ㅈ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ',
  'ㅏ','ㅑ','ㅓ','ㅕ','ㅗ','ㅛ','ㅜ','ㅠ','ㅡ','ㅣ','ㅐ','ㅔ',
];
const HANGUL_SYLLABLES = [
  '가','나','다','라','마','바','사','아','자','차','카','타','파','하',
  '기','니','디','리','미','비','시','이','지','치','키','티','피','히',
  '고','노','도','로','모','보','소','오','조','초','코','토','포','호',
  '구','누','두','루','무','부','수','우','주','추','쿠','투','푸','후',
  '박','수','잡','기','놀','이','즐','거','움','한','글',
];

// 손끝 충돌 / 파티클 버스트 튜닝값
const TOUCH_DIST    = 38;   // px — 이 거리보다 가까우면 "닿은" 것으로 본다
const TOUCH_RELEASE = 70;   // px — 이 거리 이상으로 떨어져야 다음 버스트가 다시 발동한다
const BURST_PARTICLES = 20; // 손끝 한 쌍이 닿을 때마다 터지는 파티클 수
const MAX_PARTICLES = 320;  // 파티클 배열이 무한히 커지지 않도록 잡는 상한

const PERF_PROFILES = {
  high:     { burstScale: 1.00, particleCapScale: 1.00, glowScale: 1.00, particleGlow: 18 },
  balanced: { burstScale: 0.75, particleCapScale: 0.75, glowScale: 0.72, particleGlow: 12 },
  low:      { burstScale: 0.50, particleCapScale: 0.50, glowScale: 0.45, particleGlow: 7 },
};

// 손끝 쌍(엄지~새끼)별 "현재 닿아 있는 중"이라는 플래그.
const contactState = [false, false, false, false, false];
let particles = [];
let pulseLevel = 0;
let pulseHue = 180;
let fpsSmoothed = 60;
let perfMode = 'high';
let statusEl;
let leftDotEl;
let rightDotEl;
let fpsReadoutEl;
let perfReadoutEl;
let lastHudKey = '';
let visualMode = 'strings';
let modeButtonEls = [];
let spherePitch = -0.34;
let sphereRoll = 0;

// 한글 박수 게임 상태
let clapGameState = 'idle';    // 'idle' | 'playing' | 'finished'
let clapScore = 0;
let clapTimeLeft = GAME_DURATION;
let clapTargets = [];
let clapInContact = false;     // 양손 손바닥이 붙어 있는 동안 true (상승 에지 검출용)
let clapHighScore = 0;
let clapSpawnAccum = 0;        // 다음 타깃 스폰까지 남은 시간 누적
let clapLastUpdateMs = 0;      // tickClapGame에서 dt 계산용
let clapJustEndedMs = 0;       // 종료 직후 박수가 곧바로 재시작 트리거 되는 것 방지
let clapElements = null;       // 오버레이 DOM 캐시

function setup() {
  createCanvas(windowWidth, windowHeight);
  pixelDensity(1);
  colorMode(HSB, 360, 100, 100, 1);
  background(0);
  videoEl = document.getElementById('cam');
  initHud();
  initModeControls();
  initClapGame();
  initMediaPipe();
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}

async function initMediaPipe() {
  const status = statusEl || document.getElementById('status');
  try {
    const hands = new Hands({
      locateFile: (file) =>
        `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`,
    });
    hands.setOptions({
      maxNumHands: 2,
      modelComplexity: 0,         // 빠른 모델 — 손끝 추적엔 #1까지 필요 없다
      minDetectionConfidence: 0.6,
      minTrackingConfidence: 0.5,
    });
    hands.onResults((r) => { latestResults = r; });

    const camera = new Camera(videoEl, {
      onFrame: async () => { await hands.send({ image: videoEl }); },
      width: 1280,
      height: 720,
    });
    await camera.start();

    status.textContent = '양손을 비춰 주세요';
    setTimeout(() => { status.style.opacity = '0.18'; }, 3500);
  } catch (err) {
    status.textContent = '카메라 오류: ' + (err.message || err);
    status.style.color = '#ff5577';
    status.style.opacity = '0.95';
    console.error(err);
  }
}

function draw() {
  background(0);
  updatePerformanceMode();
  if (!videoEl || videoEl.readyState < 2) return;

  drawMirroredWebcam();
  drawDimOverlay();

  const allHands = latestResults && latestResults.multiHandLandmarks
    ? latestResults.multiHandLandmarks
    : [];
  const handedness = latestResults && latestResults.multiHandedness
    ? latestResults.multiHandedness
    : [];

  // MediaPipe의 "Left/Right" 라벨은 카메라 시점 기준이다.
  // 화면에서는 영상을 좌우 반전해서 보여주므로 라벨도 뒤집어 매핑한다.
  const handMap = { Left: null, Right: null };
  for (let i = 0; i < allHands.length; i++) {
    const raw = handedness[i] && handedness[i].label;
    if (raw !== 'Left' && raw !== 'Right') continue;
    const onScreen = raw === 'Left' ? 'Right' : 'Left';
    handMap[onScreen] = allHands[i];
  }

  updateHud(Boolean(handMap.Left), Boolean(handMap.Right));

  // 한글 박수 모드는 손이 안 보여도 타이머가 굴러가야 하므로 매 프레임 틱.
  const inClapMode = visualMode === 'clap';
  if (inClapMode) {
    tickClapGame();
    syncClapHud();
  }

  if (allHands.length === 0) {
    resetContactState();
    if (inClapMode) {
      clapInContact = false;
      drawClapTargets();
    }
    updateAndDrawParticles();
    drawScreenPulse();
    return;
  }

  // 1. 인식된 손 모든 관절에 발광 점.
  for (let i = 0; i < allHands.length; i++) drawHandDots(allHands[i]);

  // 2. 모드별 메인 시각화 + 손끝/박수 감지.
  if (inClapMode) {
    if (handMap.Left && handMap.Right) {
      detectClap(handMap.Left, handMap.Right);
    } else {
      // 한 손을 놓치면 다음 박수가 새로 잡히도록 재무장.
      clapInContact = false;
    }
    drawClapTargets();
  } else if (handMap.Left && handMap.Right) {
    // 양손 다 잡혔을 때는 손끝 충돌을 감지해서 버스트를 띄운다.
    detectFingertipCollisions(handMap.Left, handMap.Right);
    if (visualMode === 'sphere') {
      drawWireSphereBetweenHands(handMap.Left, handMap.Right);
    } else {
      drawCradleStrings(handMap.Left, handMap.Right);
    }
  } else {
    // 한 손을 놓치면 다음 접촉이 새 버스트로 잡히도록 모든 쌍을 재무장한다.
    resetContactState();
    // 구체 모드에서 한 손만 보일 때는 손가락들 사이에 작은 행성을 띄운다.
    if (visualMode === 'sphere' && (handMap.Left || handMap.Right)) {
      drawWireSphereForSingleHand(handMap.Left || handMap.Right);
    }
  }

  // 3. 파티클은 항상 다른 그림 위에서 갱신·렌더한다.
  updateAndDrawParticles();
  drawScreenPulse();
}

/* ----- 보조 함수 ---------------------------------------------- */

function initHud() {
  statusEl = document.getElementById('status');
  leftDotEl = document.getElementById('leftDot');
  rightDotEl = document.getElementById('rightDot');
  fpsReadoutEl = document.getElementById('fpsReadout');
  perfReadoutEl = document.getElementById('perfReadout');
}

function initModeControls() {
  modeButtonEls = Array.from(document.querySelectorAll('#modeControls button'));
  for (const button of modeButtonEls) {
    button.addEventListener('click', () => setVisualMode(button.dataset.mode));
  }
  syncModeButtons();
}

function setVisualMode(mode) {
  if (mode !== 'strings' && mode !== 'sphere' && mode !== 'clap') return;
  if (visualMode === mode) return;

  const wasClap = visualMode === 'clap';
  visualMode = mode;
  particles = [];
  pulseLevel = 0;
  resetContactState();
  syncModeButtons();

  if (wasClap && mode !== 'clap') deactivateClapMode();
  if (mode === 'clap') activateClapMode();
}

function syncModeButtons() {
  for (const button of modeButtonEls) {
    const active = button.dataset.mode === visualMode;
    button.classList.toggle('active', active);
    button.setAttribute('aria-pressed', active ? 'true' : 'false');
  }
}

function getPerfProfile() {
  return PERF_PROFILES[perfMode] || PERF_PROFILES.high;
}

function getParticleCap() {
  return Math.round(MAX_PARTICLES * getPerfProfile().particleCapScale);
}

function updatePerformanceMode() {
  const instantFps = 1000 / Math.max(deltaTime || 16.67, 1);
  fpsSmoothed = lerp(fpsSmoothed, instantFps, 0.04);

  if (frameCount % 30 !== 0) return;

  if (fpsSmoothed < 38) {
    perfMode = 'low';
  } else if (fpsSmoothed < 52 && perfMode === 'high') {
    perfMode = 'balanced';
  } else if (fpsSmoothed > 58) {
    perfMode = 'high';
  } else if (fpsSmoothed > 50 && perfMode === 'low') {
    perfMode = 'balanced';
  }
}

function updateHud(leftSeen, rightSeen) {
  const fpsBucket = Math.round(fpsSmoothed / 2) * 2;
  const key = `${leftSeen}|${rightSeen}|${perfMode}|${fpsBucket}`;
  if (key === lastHudKey) return;
  lastHudKey = key;

  if (leftDotEl) leftDotEl.classList.toggle('active', leftSeen);
  if (rightDotEl) rightDotEl.classList.toggle('active', rightSeen);
  if (fpsReadoutEl) fpsReadoutEl.textContent = `${fpsBucket} 프레임`;
  if (perfReadoutEl) {
    const labels = { high: '높음', balanced: '보통', low: '낮음' };
    perfReadoutEl.textContent = labels[perfMode] || '높음';
  }

  if (!statusEl) return;

  if (leftSeen && rightSeen) {
    statusEl.textContent = '양손 인식 완료';
    statusEl.style.opacity = '0.18';
  } else if (leftSeen) {
    statusEl.textContent = '오른손을 비춰 주세요';
    statusEl.style.opacity = '0.72';
  } else if (rightSeen) {
    statusEl.textContent = '왼손을 비춰 주세요';
    statusEl.style.opacity = '0.72';
  } else {
    statusEl.textContent = '양손을 비춰 주세요';
    statusEl.style.opacity = '0.72';
  }
}

function resetContactState() {
  for (let i = 0; i < contactState.length; i++) contactState[i] = false;
}

// 좌우 매칭된 손끝 쌍이 닿는 순간(상승 에지)에 한 번씩 버스트를 발동한다.
// strings/sphere 두 모드에서 공통으로 호출된다.
function detectFingertipCollisions(leftHand, rightHand) {
  for (let f = 0; f < FINGERTIPS.length; f++) {
    const idx = FINGERTIPS[f];
    const ax = projX(leftHand[idx]);
    const ay = projY(leftHand[idx]);
    const bx = projX(rightHand[idx]);
    const by = projY(rightHand[idx]);
    const d = dist(ax, ay, bx, by);

    if (d < TOUCH_DIST && !contactState[f]) {
      contactState[f] = true;
      const t = constrain((d - D_MIN) / (D_MAX - D_MIN), 0, 1);
      // 줄놀이 모드의 색조 곡선과 같은 식 — cyan→magenta→yellow.
      const hue = (180 + t * (410 - 180)) % 360;
      spawnBurst((ax + bx) / 2, (ay + by) / 2, hue);
      triggerScreenPulse(hue);
    } else if (d > TOUCH_RELEASE) {
      contactState[f] = false;
    }
  }
}

// 거울 투영: MediaPipe는 반전되지 않은 프레임 기준의 정규화 (x,y)를 주고,
// 화면 출력 시 우리가 x를 뒤집어서 셀카처럼 보이게 만든다.
function getVideoCoverRect() {
  const vw = videoEl.videoWidth  || 1280;
  const vh = videoEl.videoHeight || 720;
  const s  = Math.max(width / vw, height / vh); // cover 핏
  const dw = vw * s, dh = vh * s;
  const dx = (width  - dw) / 2;
  const dy = (height - dh) / 2;

  return { dx, dy, dw, dh };
}

function projX(lm) {
  const { dx, dw } = getVideoCoverRect();
  return dx + (1 - lm.x) * dw;
}

function projY(lm) {
  const { dy, dh } = getVideoCoverRect();
  return dy + lm.y * dh;
}

function drawMirroredWebcam() {
  const { dx, dy, dw, dh } = getVideoCoverRect();

  push();
  translate(width, 0);
  scale(-1, 1);
  drawingContext.drawImage(videoEl, dx, dy, dw, dh);
  pop();
}

function drawDimOverlay() {
  noStroke();
  fill(230, 35, 4, 0.40);   // 깊은 푸른빛 검정 워시 — 네온이 더 도드라지도록
  rect(0, 0, width, height);
}

function drawHandDots(landmarks) {
  const ctx = drawingContext;
  const profile = getPerfProfile();
  const palette = [180, 300, 50]; // cyan, magenta, yellow
  noStroke();

  for (let i = 0; i < landmarks.length; i++) {
    const lm = landmarks[i];
    const x = projX(lm);
    const y = projY(lm);
    const isTip = FINGERTIPS.indexOf(i) !== -1;

    const hue = palette[i % palette.length];
    const r   = isTip ? 12 : 7;

    // 글로우(shadowBlur)를 절반 이하로 줄이고 알파도 낮춰 손 윤곽이 덜 번쩍이게.
    ctx.shadowBlur  = (isTip ? 12 : 6) * profile.glowScale;
    ctx.shadowColor = `hsl(${hue}, 100%, 60%)`;
    fill(hue, 75, 95, 0.72);
    circle(x, y, r);

    // 안쪽 코어 — 흰빛이 덜 도드라지도록 채도 살짝 올리고 알파 낮춤
    ctx.shadowBlur = 2;
    fill(hue, 35, 100, 0.78);
    circle(x, y, r * 0.4);
  }

  ctx.shadowBlur = 0;
}

function drawCradleStrings(leftHand, rightHand) {
  const ctx = drawingContext;
  noFill();

  for (let f = 0; f < FINGERTIPS.length; f++) {
    const idx = FINGERTIPS[f];
    const a = leftHand[idx];
    const b = rightHand[idx];
    const ax = projX(a), ay = projY(a);
    const bx = projX(b), by = projY(b);

    const d = dist(ax, ay, bx, by);
    const t = constrain((d - D_MIN) / (D_MAX - D_MIN), 0, 1);

    // 색조 곡선: cyan(180°) → magenta(300°) → yellow(50°, 단조 증가를 위해 410°로 잡음)
    const hue = (180 + t * (410 - 180)) % 360;
    const sat = 95, bri = 100;

    // 팽팽한 줄은 굵게, 늘어진 줄은 가늘게 점점 가늘어진다.
    const w = lerp(5, 1.2, t);

    // 손이 가까울수록 줄이 더 처지고, 멀수록 팽팽하게 곧아진다.
    const sag = (1 - t) * 70;
    const cx = (ax + bx) / 2;
    const cy = (ay + by) / 2 + sag;

    drawLayeredString(ax, ay, cx, cy, bx, by, hue, sat, bri, w);
  }

  ctx.shadowBlur = 0;
}

function drawWireSphereBetweenHands(leftHand, rightHand) {
  const bridge = getFingerBridge(leftHand, rightHand);
  const t = constrain((bridge.distance - SPHERE_D_MIN) / (SPHERE_D_MAX - SPHERE_D_MIN), 0, 1);
  const maxRadius = Math.min(SPHERE_R_MAX, Math.min(width, height) * 0.38);
  const radius = lerp(SPHERE_R_MIN, maxRadius, t);
  const hue = (185 + t * 145 + frameCount * 0.35) % 360;

  drawWireSphere(bridge.x, bridge.y, radius, hue, bridge);
}

// 한 손만 보일 때: 그 손의 손가락(검지~새끼) 가운데에 행성처럼 작은 구체를 띄운다.
// 손가락이 모일수록 작아지고, 활짝 펴면 커진다.
function drawWireSphereForSingleHand(hand) {
  const bridge = getSingleHandBridge(hand);
  const t = constrain(
    (bridge.distance - SOLO_SPREAD_MIN) / (SOLO_SPREAD_MAX - SOLO_SPREAD_MIN),
    0, 1
  );
  const maxRadius = Math.min(SOLO_R_MAX, Math.min(width, height) * 0.28);
  const radius = lerp(SOLO_R_MIN, maxRadius, t);
  // 양손 구체와 구분되는 따뜻한 행성 색조: 호박색→오렌지→로즈
  const hue = (28 + t * 78 + frameCount * 0.4) % 360;

  drawWireSphere(bridge.x, bridge.y, radius, hue, bridge);
}

function getFingerBridge(leftHand, rightHand) {
  let x = 0;
  let y = 0;
  let leftX = 0;
  let leftY = 0;
  let rightX = 0;
  let rightY = 0;
  let distance = 0;

  for (let i = 0; i < SPHERE_FINGERS.length; i++) {
    const idx = SPHERE_FINGERS[i];
    const lx = projX(leftHand[idx]);
    const ly = projY(leftHand[idx]);
    const rx = projX(rightHand[idx]);
    const ry = projY(rightHand[idx]);

    x += (lx + rx) / 2;
    y += (ly + ry) / 2;
    leftX += lx;
    leftY += ly;
    rightX += rx;
    rightY += ry;
    distance += dist(lx, ly, rx, ry);
  }

  leftX /= SPHERE_FINGERS.length;
  leftY /= SPHERE_FINGERS.length;
  rightX /= SPHERE_FINGERS.length;
  rightY /= SPHERE_FINGERS.length;

  return {
    x: x / SPHERE_FINGERS.length,
    y: y / SPHERE_FINGERS.length,
    leftX,
    leftY,
    rightX,
    rightY,
    distance: distance / SPHERE_FINGERS.length,
  };
}

// 단일 손 → 행성 위치/기울기를 만든다.
// - 중심: 검지~새끼 끝점 4개의 평균(centroid)
// - distance: 평균 반경(centroid에서 각 손끝까지 거리의 평균) — 손가락이 펴진 정도
// - leftXY/rightXY: 검지/새끼 끝점을 좌/우 끝으로 써서 손 기울기를 그대로 반영
function getSingleHandBridge(hand) {
  let cx = 0;
  let cy = 0;
  const tips = [];

  for (let i = 0; i < SPHERE_FINGERS.length; i++) {
    const idx = SPHERE_FINGERS[i];
    const x = projX(hand[idx]);
    const y = projY(hand[idx]);
    tips.push({ x, y });
    cx += x;
    cy += y;
  }
  cx /= SPHERE_FINGERS.length;
  cy /= SPHERE_FINGERS.length;

  let spread = 0;
  for (let i = 0; i < tips.length; i++) {
    spread += dist(tips[i].x, tips[i].y, cx, cy);
  }
  spread /= tips.length;

  const indexX = projX(hand[8]);
  const indexY = projY(hand[8]);
  const pinkyX = projX(hand[20]);
  const pinkyY = projY(hand[20]);

  return {
    x: cx,
    y: cy,
    leftX: indexX,
    leftY: indexY,
    rightX: pinkyX,
    rightY: pinkyY,
    distance: spread,
  };
}

function drawWireSphere(x, y, radius, hue, bridge) {
  const ctx = drawingContext;
  const profile = getPerfProfile();
  const meridianCount = perfMode === 'low' ? 5 : 7;
  const latitudes = perfMode === 'low'
    ? [-0.62, 0, 0.62]
    : [-0.78, -0.45, 0, 0.45, 0.78];
  const samples = perfMode === 'low' ? 18 : 28;
  const yaw = frameCount * 0.048;
  const handHeight = constrain((bridge.y - height * 0.5) / (height * 0.5), -1, 1);
  const handTilt = Math.atan2(bridge.rightY - bridge.leftY, bridge.rightX - bridge.leftX);
  const targetPitch = -0.34 + handHeight * 0.42 + Math.sin(frameCount * 0.018) * 0.04;
  const targetRoll = constrain(handTilt, -0.85, 0.85);
  spherePitch = lerp(spherePitch, targetPitch, 0.16);
  sphereRoll = lerp(sphereRoll, targetRoll, 0.18);
  const pitch = spherePitch;
  const roll = sphereRoll;

  push();
  translate(x, y);
  noFill();

  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.shadowColor = `hsl(${hue}, 100%, 62%)`;
  ctx.shadowBlur = 10 * profile.glowScale;

  stroke(hue, 70, 100, 0.11);
  strokeWeight(5);
  circle(0, 0, radius * 2.08);

  ctx.shadowBlur = 0;
  drawSaturnRings(radius, hue, yaw, pitch, roll, samples, 'back');

  for (let i = 0; i < latitudes.length; i++) {
    const latitude = latitudes[i];
    const isEquator = latitude === 0;
    const curve = (u) => spherePoint(u * TWO_PI, latitude);

    drawProjectedSphereCurve(curve, {
      samples,
      radius,
      yaw,
      pitch,
      roll,
      hue: (hue + i * 5) % 360,
      sat: 78,
      alpha: isEquator ? 0.16 : 0.11,
      weight: isEquator ? 1.45 : 1.0,
      frontOnly: false,
    });
    drawProjectedSphereCurve(curve, {
      samples,
      radius,
      yaw,
      pitch,
      roll,
      hue: (hue + i * 5) % 360,
      sat: 82,
      alpha: isEquator ? 0.58 : 0.40,
      weight: isEquator ? 1.65 : 1.12,
      frontOnly: true,
    });
  }

  for (let i = 0; i < meridianCount; i++) {
    const theta = (TWO_PI / meridianCount) * i;
    const curve = (u) => spherePoint(theta, -HALF_PI + u * TWO_PI);

    drawProjectedSphereCurve(curve, {
      samples,
      radius,
      yaw,
      pitch,
      roll,
      hue: (hue + 24) % 360,
      sat: 86,
      alpha: 0.12,
      weight: 1.1,
      frontOnly: false,
    });
    drawProjectedSphereCurve(curve, {
      samples,
      radius,
      yaw,
      pitch,
      roll,
      hue: (hue + 24) % 360,
      sat: 90,
      alpha: 0.44,
      weight: 1.18,
      frontOnly: true,
    });
  }

  // 더 밝은 한 줄을 추가해서 좌우 회전 방향을 한눈에 알아볼 수 있게 만든다.
  drawProjectedSphereCurve((u) => spherePoint(0, -HALF_PI + u * TWO_PI), {
    samples,
    radius,
    yaw,
    pitch,
    roll,
    hue: (hue + 58) % 360,
    sat: 90,
    alpha: 0.88,
    weight: 2.15,
    frontOnly: true,
  });

  drawSaturnRings(radius, hue, yaw, pitch, roll, samples, 'front');

  ctx.shadowBlur = 2 * profile.glowScale;
  stroke(hue, 12, 100, 0.86);
  strokeWeight(0.85);
  circle(0, 0, radius * 2.04);

  pop();
  ctx.shadowBlur = 0;
}

function drawSaturnRings(radius, hue, yaw, pitch, roll, samples, depthMode) {
  const ringHue = 42;
  const rings = [
    { scale: 1.24, alpha: 0.18, weight: 0.75, hueShift: -8 },
    { scale: 1.34, alpha: 0.34, weight: 1.15, hueShift: 0 },
    { scale: 1.43, alpha: 0.50, weight: 1.65, hueShift: 10 },
    { scale: 1.51, alpha: 0.74, weight: 2.65, hueShift: 24 },
    { scale: 1.60, alpha: 0.42, weight: 1.25, hueShift: 42 },
    { scale: 1.70, alpha: 0.22, weight: 0.85, hueShift: 58 },
  ];
  const ringPitch = pitch + 0.08;

  for (let i = 0; i < rings.length; i++) {
    const ring = rings[i];
    const passAlpha = depthMode === 'front' ? ring.alpha : ring.alpha * 0.46;
    const passWeight = depthMode === 'front' ? ring.weight : ring.weight * 0.78;

    drawProjectedSphereCurve((u) => saturnRingPoint(u, ring.scale), {
      samples,
      radius,
      yaw: yaw * 0.72,
      pitch: ringPitch,
      roll,
      hue: (ringHue + ring.hueShift + 360) % 360,
      sat: 92,
      alpha: passAlpha,
      weight: passWeight,
      depthMode,
    });
  }
}

function saturnRingPoint(u, scale) {
  const angle = u * TWO_PI;
  return {
    x: Math.cos(angle) * scale,
    y: 0,
    z: Math.sin(angle) * scale,
  };
}

function spherePoint(theta, phi) {
  const cosPhi = Math.cos(phi);
  return {
    x: cosPhi * Math.cos(theta),
    y: Math.sin(phi),
    z: cosPhi * Math.sin(theta),
  };
}

function drawProjectedSphereCurve(pointAt, options) {
  stroke(options.hue, options.sat, 100, options.alpha);
  strokeWeight(options.weight);

  let drawing = false;
  for (let i = 0; i <= options.samples; i++) {
    const u = i / options.samples;
    const point = projectSpherePoint(pointAt(u), options.radius, options.yaw, options.pitch, options.roll || 0);
    const depthMode = options.depthMode || (options.frontOnly ? 'front' : 'all');
    const visible = depthMode === 'front'
      ? point.z > -0.08
      : depthMode === 'back'
        ? point.z <= 0.08
        : true;

    if (visible && !drawing) {
      beginShape();
      drawing = true;
    }

    if (visible) vertex(point.x, point.y);

    if ((!visible || i === options.samples) && drawing) {
      endShape();
      drawing = false;
    }
  }
}

function projectSpherePoint(point, radius, yaw, pitch, roll) {
  const x0 = point.x * radius;
  const y0 = point.y * radius;
  const z0 = point.z * radius;
  const yawCos = Math.cos(yaw);
  const yawSin = Math.sin(yaw);
  const pitchCos = Math.cos(pitch);
  const pitchSin = Math.sin(pitch);
  const rollCos = Math.cos(roll);
  const rollSin = Math.sin(roll);
  const x1 = x0 * yawCos + z0 * yawSin;
  const z1 = -x0 * yawSin + z0 * yawCos;
  const y1 = y0 * pitchCos - z1 * pitchSin;
  const z2 = y0 * pitchSin + z1 * pitchCos;
  const x2 = x1 * rollCos - y1 * rollSin;
  const y2 = x1 * rollSin + y1 * rollCos;
  const cameraZ = radius * 4.2;
  const scale = cameraZ / (cameraZ - z2);

  return {
    x: x2 * scale,
    y: y2 * scale,
    z: z2 / radius,
  };
}

function drawLayeredString(ax, ay, cx, cy, bx, by, hue, sat, bri, w) {
  const ctx = drawingContext;
  const profile = getPerfProfile();

  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.shadowColor = `hsl(${hue}, 100%, 60%)`;

  ctx.shadowBlur = 30 * profile.glowScale;
  stroke(hue, sat, bri, 0.24);
  strokeWeight(w + 7);
  drawStringPath(ax, ay, cx, cy, bx, by);

  ctx.shadowBlur = 12 * profile.glowScale;
  stroke(hue, sat, bri, 0.78);
  strokeWeight(w + 1.8);
  drawStringPath(ax, ay, cx, cy, bx, by);

  ctx.shadowBlur = 3 * profile.glowScale;
  stroke(hue, 18, 100, 0.96);
  strokeWeight(Math.max(1, w * 0.38));
  drawStringPath(ax, ay, cx, cy, bx, by);
}

function drawStringPath(ax, ay, cx, cy, bx, by) {
  beginShape();
  vertex(ax, ay);
  quadraticVertex(cx, cy, bx, by);
  endShape();
}

function triggerScreenPulse(hue) {
  pulseHue = hue;
  pulseLevel = Math.min(1, pulseLevel + 0.42);
}

function drawScreenPulse() {
  if (pulseLevel <= 0.01) {
    pulseLevel = 0;
    return;
  }

  const profile = getPerfProfile();
  drawingContext.shadowBlur = 0;
  blendMode(ADD);
  noStroke();
  fill(pulseHue, 55, 70, 0.10 * pulseLevel * profile.glowScale);
  rect(0, 0, width, height);
  blendMode(BLEND);

  pulseLevel *= Math.pow(0.82, (deltaTime || 16.67) / 16.67);
}

/* ----- 손끝 접촉 시 파티클 버스트 ------------------------------ */

function spawnBurst(x, y, baseHue) {
  // 미친 듯이 두드릴 때도 파티클이 무한히 늘지 않도록 총량을 캡한다.
  const profile = getPerfProfile();
  const countTarget = Math.max(8, Math.round(BURST_PARTICLES * profile.burstScale));
  const budget = getParticleCap() - particles.length;
  if (budget <= 0) return;

  const COUNT = Math.min(countTarget, budget);
  for (let i = 0; i < COUNT; i++) {
    const ang = Math.random() * Math.PI * 2;
    const sp  = 2.0 + Math.random() * 7.5;     // 2 → 9.5 px/프레임
    // 줄 색조 주변으로 살짝 흔들고, 가끔(25%) cyan/magenta/yellow 팔레트로 튄다.
    const palette = [180, 300, 50];
    const useFlash = Math.random() < 0.25;
    const hue = useFlash
      ? palette[(Math.random() * palette.length) | 0]
      : (baseHue + (Math.random() - 0.5) * 80 + 360) % 360;

    particles.push({
      x, y,
      vx: Math.cos(ang) * sp,
      vy: Math.sin(ang) * sp,
      life: 1.0,                                // 약 45프레임에 걸쳐 1 → 0
      decay: 0.020 + Math.random() * 0.015,
      hue,
      size: 3 + Math.random() * 6,
    });
  }
}

function updateAndDrawParticles() {
  if (particles.length === 0) return;
  const ctx = drawingContext;
  const profile = getPerfProfile();
  const particleCap = getParticleCap();
  noStroke();

  if (particles.length > particleCap) {
    particles.splice(0, particles.length - particleCap);
  }

  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    // 베를레 비슷한 적분: 약한 마찰 + 가벼운 중력 → "불꽃" 같은 느낌.
    p.x  += p.vx;
    p.y  += p.vy;
    p.vx *= 0.93;
    p.vy  = p.vy * 0.93 + 0.18;
    p.life -= p.decay;

    if (p.life <= 0) {
      particles.splice(i, 1);
      continue;
    }

    ctx.shadowBlur  = profile.particleGlow;
    ctx.shadowColor = `hsl(${p.hue}, 100%, 65%)`;
    fill(p.hue, 90, 100, p.life);
    circle(p.x, p.y, p.size * p.life + 0.8);
  }

  ctx.shadowBlur = 0;
}

/* ----- 한글 박수 미니게임 ------------------------------------- */

function initClapGame() {
  clapElements = {
    overlay: document.getElementById('clapGameOverlay'),
    score: document.getElementById('clapScore'),
    timer: document.getElementById('clapTimer'),
    best: document.getElementById('clapBest'),
    prompt: document.getElementById('clapPrompt'),
  };
  try {
    const stored = localStorage.getItem(HIGH_SCORE_KEY);
    clapHighScore = stored ? (parseInt(stored, 10) || 0) : 0;
  } catch (e) {
    clapHighScore = 0;
  }
  syncClapHud();
}

// 모드 진입 시 호출: 오버레이 켜고 idle 상태로 초기화한다.
function activateClapMode() {
  resetClapGame('idle');
  if (clapElements && clapElements.overlay) {
    clapElements.overlay.classList.remove('hidden');
  }
  syncClapHud();
}

// 모드 이탈 시 호출: 오버레이 끄고 타깃 정리.
function deactivateClapMode() {
  if (clapElements && clapElements.overlay) {
    clapElements.overlay.classList.add('hidden');
  }
  clapTargets = [];
  clapInContact = false;
}

function resetClapGame(nextState) {
  clapGameState = nextState || 'idle';
  clapScore = 0;
  clapTimeLeft = GAME_DURATION;
  clapTargets = [];
  clapInContact = false;
  clapSpawnAccum = 0;
  clapLastUpdateMs = performance.now();
}

function startClapGame() {
  resetClapGame('playing');
  clapJustEndedMs = 0;
}

function endClapGame() {
  clapGameState = 'finished';
  clapJustEndedMs = performance.now();
  if (clapScore > clapHighScore) {
    clapHighScore = clapScore;
    try { localStorage.setItem(HIGH_SCORE_KEY, String(clapHighScore)); } catch (e) {}
  }
}

function syncClapHud() {
  if (!clapElements) return;
  if (clapElements.score) clapElements.score.textContent = String(clapScore);
  if (clapElements.timer) clapElements.timer.textContent = Math.max(0, clapTimeLeft).toFixed(1);
  if (clapElements.best)  clapElements.best.textContent  = String(clapHighScore);
  if (clapElements.prompt) {
    let text = '';
    if (clapGameState === 'idle') {
      text = '양손으로 박수쳐서 시작!';
    } else if (clapGameState === 'finished') {
      text = `${clapScore}점! 최고 ${clapHighScore}점 — 다시 박수쳐서 재도전`;
    }
    clapElements.prompt.textContent = text;
    clapElements.prompt.style.display = text ? '' : 'none';
  }
}

// 타이머·스폰·타깃 노화 — 손 인식 여부와 무관하게 매 프레임 호출.
function tickClapGame() {
  const now = performance.now();
  const dt = clapLastUpdateMs ? Math.min(0.1, (now - clapLastUpdateMs) / 1000) : 0;
  clapLastUpdateMs = now;

  if (clapGameState === 'playing') {
    clapTimeLeft -= dt;
    if (clapTimeLeft <= 0) {
      clapTimeLeft = 0;
      endClapGame();
    } else {
      // 종반부로 갈수록 스폰 간격이 줄어 난이도가 자연스럽게 올라간다.
      const progress = 1 - clapTimeLeft / GAME_DURATION;
      const interval = lerp(SPAWN_INTERVAL_BASE, SPAWN_INTERVAL_MIN, progress);
      clapSpawnAccum += dt;
      while (clapSpawnAccum >= interval) {
        clapSpawnAccum -= interval;
        spawnClapTarget();
      }
    }
  }

  // 모든 타깃 나이 갱신, 수명 다한 것 제거.
  for (let i = clapTargets.length - 1; i >= 0; i--) {
    clapTargets[i].age += dt;
    if (clapTargets[i].age > TARGET_LIFETIME) {
      clapTargets.splice(i, 1);
    }
  }
}

function spawnClapTarget() {
  const isSyllable = Math.random() < SYLLABLE_PROBABILITY;
  const pool = isSyllable ? HANGUL_SYLLABLES : HANGUL_JAMO;
  const char = pool[(Math.random() * pool.length) | 0];
  // 시안/마젠타/옐로 위주 + 청록·핑크 등 확장 팔레트
  const palette = [180, 300, 50, 200, 330, 70, 270];
  const hue = palette[(Math.random() * palette.length) | 0];

  // HUD(상단), 모드 버튼(하단), 좌우 스코어보드와 부딪히지 않게 마진.
  const sideMargin = 90;
  const topMargin = 140;
  const bottomMargin = 130;
  const x = sideMargin + Math.random() * Math.max(1, width - sideMargin * 2);
  const y = topMargin + Math.random() * Math.max(1, height - topMargin - bottomMargin);

  clapTargets.push({
    x, y,
    char,
    isSyllable,
    hue,
    age: 0,
    size: isSyllable ? 88 : 70,
    rot: (Math.random() - 0.5) * 0.35,
    hit: false,
  });
}

function targetAlpha(target) {
  if (target.age < TARGET_FADE_IN) return target.age / TARGET_FADE_IN;
  const remaining = TARGET_LIFETIME - target.age;
  if (remaining < TARGET_FADE_OUT) return Math.max(0, remaining / TARGET_FADE_OUT);
  return 1;
}

function drawClapTargets() {
  if (clapTargets.length === 0) return;
  const ctx = drawingContext;
  const prevAlign = (typeof textAlign === 'function');
  textAlign(CENTER, CENTER);
  textStyle(BOLD);
  // OS에 따라 한글 폴백을 보장하기 위해 명시적으로 폰트 지정.
  textFont("'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif");

  for (let i = 0; i < clapTargets.length; i++) {
    const t = clapTargets[i];
    const alpha = targetAlpha(t);
    if (alpha <= 0) continue;

    push();
    translate(t.x, t.y);
    rotate(t.rot);

    // 헤일로 링 — 명중 가능 범위를 시각적으로 암시
    ctx.shadowBlur = 24;
    ctx.shadowColor = `hsl(${t.hue}, 100%, 65%)`;
    noFill();
    stroke(t.hue, 75, 100, 0.42 * alpha);
    strokeWeight(2.2);
    circle(0, 0, t.size * 1.7);

    // 안쪽 반투명 백드롭
    noStroke();
    fill(t.hue, 80, 28, 0.38 * alpha);
    circle(0, 0, t.size * 1.45);

    // 글리프 — 외곽 발광 한 번, 안쪽 밝은 코어 한 번 (2-패스 글로우)
    textSize(t.size);
    ctx.shadowBlur = 22;
    ctx.shadowColor = `hsl(${t.hue}, 100%, 62%)`;
    fill(t.hue, 80, 100, alpha);
    text(t.char, 0, 4);

    ctx.shadowBlur = 6;
    fill(0, 0, 100, 0.95 * alpha);
    textSize(t.size * 0.92);
    text(t.char, 0, 4);

    // 음절(3점)은 위쪽에 작은 "3" 배지를 띄워서 자모와 구분
    if (t.isSyllable) {
      ctx.shadowBlur = 8;
      ctx.shadowColor = '#ff0';
      textFont('Courier New, Consolas, monospace');
      textSize(15);
      fill(54, 95, 100, 0.95 * alpha);
      text('+3', 0, -t.size * 0.7);
      textFont("'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif");
    }

    pop();
  }
  ctx.shadowBlur = 0;
}

function detectClap(leftHand, rightHand) {
  const ax = projX(leftHand[PALM_LANDMARK]);
  const ay = projY(leftHand[PALM_LANDMARK]);
  const bx = projX(rightHand[PALM_LANDMARK]);
  const by = projY(rightHand[PALM_LANDMARK]);
  const d = dist(ax, ay, bx, by);
  const mx = (ax + bx) / 2;
  const my = (ay + by) / 2;

  if (d < CLAP_DIST && !clapInContact) {
    clapInContact = true;
    // 박수 중간점 + 양 손바닥 좌표를 함께 넘겨 너그러운 3점 판정에 쓴다.
    handleClap(mx, my, ax, ay, bx, by);
  } else if (d > CLAP_RELEASE) {
    clapInContact = false;
  }
}

function handleClap(x, y, lx, ly, rx, ry) {
  // 박수 자체에 항상 시각 피드백을 준다.
  spawnBurst(x, y, 200);
  triggerScreenPulse(200);

  if (clapGameState === 'idle') {
    startClapGame();
    return;
  }
  if (clapGameState === 'finished') {
    // 직후 박수가 곧바로 재시작 트리거 되지 않도록 유예
    if (performance.now() - clapJustEndedMs < RESTART_GRACE_MS) return;
    startClapGame();
    return;
  }
  if (clapGameState !== 'playing') return;

  // 명중 검사 — 박수 중간점 + 좌·우 손바닥 3점 중 하나라도 HIT_RADIUS 안이면 명중.
  // 양 손바닥 위치도 받지 못한 경우(이전 호출 시그니처 호환)는 중간점만 검사.
  const hasPalmPoints =
    typeof lx === 'number' && typeof ly === 'number' &&
    typeof rx === 'number' && typeof ry === 'number';

  let hitCount = 0;
  for (let i = clapTargets.length - 1; i >= 0; i--) {
    const t = clapTargets[i];
    if (t.hit) continue;
    const a = targetAlpha(t);
    if (a <= 0.05) continue;

    const dMid = dist(x, y, t.x, t.y);
    const dLeft = hasPalmPoints ? dist(lx, ly, t.x, t.y) : Infinity;
    const dRight = hasPalmPoints ? dist(rx, ry, t.x, t.y) : Infinity;
    const closest = Math.min(dMid, dLeft, dRight);

    if (closest <= HIT_RADIUS) {
      t.hit = true;
      clapScore += t.isSyllable ? 3 : 1;
      // 명중 위치에서 한 번 더 축포
      spawnBurst(t.x, t.y, t.hue);
      clapTargets.splice(i, 1);
      hitCount++;
    }
  }
  if (hitCount > 0) {
    // 노란 섬광 — 점수 적립 피드백
    triggerScreenPulse(54);
  }
}
</script>
