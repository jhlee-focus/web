<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cat's Cradle — Neon Hand Tracking</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: #000;
    color: #9ff;
    font-family: 'Courier New', Consolas, monospace;
  }
  /* Hidden source <video>; we paint frames manually onto the p5 canvas. */
  #cam { display: none; }
  #status {
    position: fixed;
    top: 12px;
    left: 14px;
    z-index: 10;
    font-size: 12px;
    letter-spacing: 0.08em;
    opacity: 0.7;
    text-shadow: 0 0 6px #0ff, 0 0 12px #0ff8;
    pointer-events: none;
    transition: opacity 0.8s ease;
  }
  #hud {
    position: fixed;
    top: 12px;
    right: 14px;
    z-index: 10;
    display: flex;
    align-items: center;
    gap: 12px;
    color: #dfffff;
    font-size: 11px;
    letter-spacing: 0.08em;
    opacity: 0.78;
    pointer-events: none;
    text-shadow: 0 0 6px #0ff, 0 0 12px #0ff8;
  }
  .hud-item {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    min-width: 22px;
  }
  .hud-dot {
    width: 7px;
    height: 7px;
    border: 1px solid #377;
    border-radius: 50%;
    background: #044;
    box-shadow: 0 0 4px #033;
    opacity: 0.48;
  }
  .hud-dot.active {
    border-color: #eff;
    background: #9ff;
    opacity: 1;
    box-shadow: 0 0 7px #0ff, 0 0 16px #0ff8;
  }
  #rightDot.active {
    background: #f6f;
    box-shadow: 0 0 7px #f6f, 0 0 16px #f6f8;
  }
  @media (max-width: 520px) {
    #hud {
      top: 36px;
      right: auto;
      left: 14px;
      gap: 8px;
      font-size: 10px;
    }
  }
  canvas { display: block; }
</style>
</head>
<body>
<!--
  Run locally:    python -m http.server 8000
  Then visit:     http://localhost:8000/index.html
  (Opening this file via file:// blocks getUserMedia in most browsers.)
-->
<div id="status">INITIALIZING CAMERA…</div>
<div id="hud" aria-live="polite">
  <span class="hud-item"><span id="leftDot" class="hud-dot"></span>L</span>
  <span class="hud-item"><span id="rightDot" class="hud-dot"></span>R</span>
  <span id="fpsReadout" class="hud-item">-- FPS</span>
  <span id="perfReadout" class="hud-item">HI</span>
</div>
<video id="cam" playsinline autoplay muted></video>

<script src="https://cdn.jsdelivr.net/npm/p5@1.9.4/lib/p5.min.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>

<script>
/* ===========================================================
   Cat's Cradle — neon hand-tracking instrument
   p5.js (global mode) + MediaPipe Hands
   =========================================================== */

let videoEl;
let latestResults = null;

const FINGERTIPS = [4, 8, 12, 16, 20]; // thumb, index, middle, ring, pinky
const D_MIN = 60;   // px — fully-taut threshold
const D_MAX = 700;  // px — fully-stretched threshold

// Touch / particle-burst tuning
const TOUCH_DIST    = 38;   // px — fingers count as "touching" below this
const TOUCH_RELEASE = 70;   // px — must move beyond this to re-arm a burst
const BURST_PARTICLES = 20; // particles per fingertip touch burst
const MAX_PARTICLES = 320;  // hard cap so the array doesn't grow without bound

const PERF_PROFILES = {
  high:     { burstScale: 1.00, particleCapScale: 1.00, glowScale: 1.00, particleGlow: 18 },
  balanced: { burstScale: 0.75, particleCapScale: 0.75, glowScale: 0.72, particleGlow: 12 },
  low:      { burstScale: 0.50, particleCapScale: 0.50, glowScale: 0.45, particleGlow: 7 },
};

// One "in-contact" flag per matching fingertip pair (thumb..pinky).
const contactState = [false, false, false, false, false];
let particles = [];
let pulseLevel = 0;
let pulseHue = 180;
let fpsSmoothed = 60;
let perfMode = 'high';
let statusEl;
let leftDotEl;
let rightDotEl;
let fpsReadoutEl;
let perfReadoutEl;
let lastHudKey = '';

function setup() {
  createCanvas(windowWidth, windowHeight);
  pixelDensity(1);
  colorMode(HSB, 360, 100, 100, 1);
  background(0);
  videoEl = document.getElementById('cam');
  initHud();
  initMediaPipe();
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}

async function initMediaPipe() {
  const status = statusEl || document.getElementById('status');
  try {
    const hands = new Hands({
      locateFile: (file) =>
        `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`,
    });
    hands.setOptions({
      maxNumHands: 2,
      modelComplexity: 0,         // fast model — fingertips don't need #1
      minDetectionConfidence: 0.6,
      minTrackingConfidence: 0.5,
    });
    hands.onResults((r) => { latestResults = r; });

    const camera = new Camera(videoEl, {
      onFrame: async () => { await hands.send({ image: videoEl }); },
      width: 1280,
      height: 720,
    });
    await camera.start();

    status.textContent = 'SHOW BOTH HANDS';
    setTimeout(() => { status.style.opacity = '0.18'; }, 3500);
  } catch (err) {
    status.textContent = 'CAMERA ERROR: ' + (err.message || err);
    status.style.color = '#ff5577';
    status.style.opacity = '0.95';
    console.error(err);
  }
}

function draw() {
  background(0);
  updatePerformanceMode();
  if (!videoEl || videoEl.readyState < 2) return;

  drawMirroredWebcam();
  drawDimOverlay();

  const allHands = latestResults && latestResults.multiHandLandmarks
    ? latestResults.multiHandLandmarks
    : [];
  const handedness = latestResults && latestResults.multiHandedness
    ? latestResults.multiHandedness
    : [];

  // MediaPipe's "Left/Right" label is from the camera's POV.
  // Because we mirror the video on screen, the on-screen label is flipped.
  const handMap = { Left: null, Right: null };
  for (let i = 0; i < allHands.length; i++) {
    const raw = handedness[i] && handedness[i].label;
    if (raw !== 'Left' && raw !== 'Right') continue;
    const onScreen = raw === 'Left' ? 'Right' : 'Left';
    handMap[onScreen] = allHands[i];
  }

  updateHud(Boolean(handMap.Left), Boolean(handMap.Right));

  if (allHands.length === 0) {
    resetContactState();
    updateAndDrawParticles();
    drawScreenPulse();
    return;
  }

  // 1. Glowing dots on every joint of every visible hand.
  for (let i = 0; i < allHands.length; i++) drawHandDots(allHands[i]);

  // 2. Elastic strings between matching fingertips of left & right.
  if (handMap.Left && handMap.Right) {
    drawCradleStrings(handMap.Left, handMap.Right);
  } else {
    // Lost a hand → re-arm every pair so the next touch fires a fresh burst.
    for (let i = 0; i < contactState.length; i++) contactState[i] = false;
  }

  // 3. Particles always update on top of everything else.
  updateAndDrawParticles();
  drawScreenPulse();
}

/* ----- helpers ------------------------------------------------ */

function initHud() {
  statusEl = document.getElementById('status');
  leftDotEl = document.getElementById('leftDot');
  rightDotEl = document.getElementById('rightDot');
  fpsReadoutEl = document.getElementById('fpsReadout');
  perfReadoutEl = document.getElementById('perfReadout');
}

function getPerfProfile() {
  return PERF_PROFILES[perfMode] || PERF_PROFILES.high;
}

function getParticleCap() {
  return Math.round(MAX_PARTICLES * getPerfProfile().particleCapScale);
}

function updatePerformanceMode() {
  const instantFps = 1000 / Math.max(deltaTime || 16.67, 1);
  fpsSmoothed = lerp(fpsSmoothed, instantFps, 0.04);

  if (frameCount % 30 !== 0) return;

  if (fpsSmoothed < 38) {
    perfMode = 'low';
  } else if (fpsSmoothed < 52 && perfMode === 'high') {
    perfMode = 'balanced';
  } else if (fpsSmoothed > 58) {
    perfMode = 'high';
  } else if (fpsSmoothed > 50 && perfMode === 'low') {
    perfMode = 'balanced';
  }
}

function updateHud(leftSeen, rightSeen) {
  const fpsBucket = Math.round(fpsSmoothed / 2) * 2;
  const key = `${leftSeen}|${rightSeen}|${perfMode}|${fpsBucket}`;
  if (key === lastHudKey) return;
  lastHudKey = key;

  if (leftDotEl) leftDotEl.classList.toggle('active', leftSeen);
  if (rightDotEl) rightDotEl.classList.toggle('active', rightSeen);
  if (fpsReadoutEl) fpsReadoutEl.textContent = `${fpsBucket} FPS`;
  if (perfReadoutEl) {
    const labels = { high: 'HI', balanced: 'BAL', low: 'LOW' };
    perfReadoutEl.textContent = labels[perfMode] || 'HI';
  }

  if (!statusEl) return;

  if (leftSeen && rightSeen) {
    statusEl.textContent = 'BOTH HANDS LOCKED';
    statusEl.style.opacity = '0.18';
  } else if (leftSeen) {
    statusEl.textContent = 'SHOW RIGHT HAND';
    statusEl.style.opacity = '0.72';
  } else if (rightSeen) {
    statusEl.textContent = 'SHOW LEFT HAND';
    statusEl.style.opacity = '0.72';
  } else {
    statusEl.textContent = 'SHOW BOTH HANDS';
    statusEl.style.opacity = '0.72';
  }
}

function resetContactState() {
  for (let i = 0; i < contactState.length; i++) contactState[i] = false;
}

// Mirrored projection: MediaPipe gives normalised (x,y) in the un-mirrored
// frame; we flip x at draw time so the user sees a selfie-style view.
function getVideoCoverRect() {
  const vw = videoEl.videoWidth  || 1280;
  const vh = videoEl.videoHeight || 720;
  const s  = Math.max(width / vw, height / vh); // cover-fit
  const dw = vw * s, dh = vh * s;
  const dx = (width  - dw) / 2;
  const dy = (height - dh) / 2;

  return { dx, dy, dw, dh };
}

function projX(lm) {
  const { dx, dw } = getVideoCoverRect();
  return dx + (1 - lm.x) * dw;
}

function projY(lm) {
  const { dy, dh } = getVideoCoverRect();
  return dy + lm.y * dh;
}

function drawMirroredWebcam() {
  const { dx, dy, dw, dh } = getVideoCoverRect();

  push();
  translate(width, 0);
  scale(-1, 1);
  drawingContext.drawImage(videoEl, dx, dy, dw, dh);
  pop();
}

function drawDimOverlay() {
  noStroke();
  fill(230, 35, 4, 0.40);   // deep blue-black wash to make neon pop
  rect(0, 0, width, height);
}

function drawHandDots(landmarks) {
  const ctx = drawingContext;
  const profile = getPerfProfile();
  const palette = [180, 300, 50]; // cyan, magenta, yellow
  noStroke();

  for (let i = 0; i < landmarks.length; i++) {
    const lm = landmarks[i];
    const x = projX(lm);
    const y = projY(lm);
    const isTip = FINGERTIPS.indexOf(i) !== -1;

    const hue = palette[i % palette.length];
    const r   = isTip ? 14 : 8;

    ctx.shadowBlur  = (isTip ? 30 : 16) * profile.glowScale;
    ctx.shadowColor = `hsl(${hue}, 100%, 60%)`;
    fill(hue, 85, 100, 0.95);
    circle(x, y, r);

    // Inner bright core
    ctx.shadowBlur = 4;
    fill(hue, 20, 100, 1);
    circle(x, y, r * 0.4);
  }

  ctx.shadowBlur = 0;
}

function drawCradleStrings(leftHand, rightHand) {
  const ctx = drawingContext;
  noFill();

  for (let f = 0; f < FINGERTIPS.length; f++) {
    const idx = FINGERTIPS[f];
    const a = leftHand[idx];
    const b = rightHand[idx];
    const ax = projX(a), ay = projY(a);
    const bx = projX(b), by = projY(b);

    const d = dist(ax, ay, bx, by);
    const t = constrain((d - D_MIN) / (D_MAX - D_MIN), 0, 1);

    // Hue sweep cyan(180°) → magenta(300°) → yellow(50°, taken as 410° to keep monotonic)
    const hue = (180 + t * (410 - 180)) % 360;

    // ----- Touch detection: spawn one burst on the rising edge ----- //
    const midX = (ax + bx) / 2;
    const midY = (ay + by) / 2;
    if (d < TOUCH_DIST && !contactState[f]) {
      contactState[f] = true;
      // Bursts inherit the current string's hue, plus a sibling palette splash.
      spawnBurst(midX, midY, hue);
      triggerScreenPulse(hue);
    } else if (d > TOUCH_RELEASE) {
      contactState[f] = false;
    }
    const sat = 95, bri = 100;

    // Taut strings draw thicker; over-stretched ones taper to a thread.
    const w = lerp(5, 1.2, t);

    // Slack rope sags more when hands are close; taut when far apart.
    const sag = (1 - t) * 70;
    const cx = (ax + bx) / 2;
    const cy = (ay + by) / 2 + sag;

    drawLayeredString(ax, ay, cx, cy, bx, by, hue, sat, bri, w);
  }

  ctx.shadowBlur = 0;
}

function drawLayeredString(ax, ay, cx, cy, bx, by, hue, sat, bri, w) {
  const ctx = drawingContext;
  const profile = getPerfProfile();

  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.shadowColor = `hsl(${hue}, 100%, 60%)`;

  ctx.shadowBlur = 30 * profile.glowScale;
  stroke(hue, sat, bri, 0.24);
  strokeWeight(w + 7);
  drawStringPath(ax, ay, cx, cy, bx, by);

  ctx.shadowBlur = 12 * profile.glowScale;
  stroke(hue, sat, bri, 0.78);
  strokeWeight(w + 1.8);
  drawStringPath(ax, ay, cx, cy, bx, by);

  ctx.shadowBlur = 3 * profile.glowScale;
  stroke(hue, 18, 100, 0.96);
  strokeWeight(Math.max(1, w * 0.38));
  drawStringPath(ax, ay, cx, cy, bx, by);
}

function drawStringPath(ax, ay, cx, cy, bx, by) {
  beginShape();
  vertex(ax, ay);
  quadraticVertex(cx, cy, bx, by);
  endShape();
}

function triggerScreenPulse(hue) {
  pulseHue = hue;
  pulseLevel = Math.min(1, pulseLevel + 0.42);
}

function drawScreenPulse() {
  if (pulseLevel <= 0.01) {
    pulseLevel = 0;
    return;
  }

  const profile = getPerfProfile();
  drawingContext.shadowBlur = 0;
  blendMode(ADD);
  noStroke();
  fill(pulseHue, 55, 70, 0.10 * pulseLevel * profile.glowScale);
  rect(0, 0, width, height);
  blendMode(BLEND);

  pulseLevel *= Math.pow(0.82, (deltaTime || 16.67) / 16.67);
}

/* ----- particle burst on fingertip touch ---------------------- */

function spawnBurst(x, y, baseHue) {
  // Cap total particle count so a furious tapper can't blow the budget.
  const profile = getPerfProfile();
  const countTarget = Math.max(8, Math.round(BURST_PARTICLES * profile.burstScale));
  const budget = getParticleCap() - particles.length;
  if (budget <= 0) return;

  const COUNT = Math.min(countTarget, budget);
  for (let i = 0; i < COUNT; i++) {
    const ang = Math.random() * Math.PI * 2;
    const sp  = 2.0 + Math.random() * 7.5;     // 2 → 9.5 px/frame
    // Slight hue jitter around the string's current hue, plus an occasional
    // palette flash (cyan / magenta / yellow) for visual contrast.
    const palette = [180, 300, 50];
    const useFlash = Math.random() < 0.25;
    const hue = useFlash
      ? palette[(Math.random() * palette.length) | 0]
      : (baseHue + (Math.random() - 0.5) * 80 + 360) % 360;

    particles.push({
      x, y,
      vx: Math.cos(ang) * sp,
      vy: Math.sin(ang) * sp,
      life: 1.0,                                // 1 → 0 over ~45 frames
      decay: 0.020 + Math.random() * 0.015,
      hue,
      size: 3 + Math.random() * 6,
    });
  }
}

function updateAndDrawParticles() {
  if (particles.length === 0) return;
  const ctx = drawingContext;
  const profile = getPerfProfile();
  const particleCap = getParticleCap();
  noStroke();

  if (particles.length > particleCap) {
    particles.splice(0, particles.length - particleCap);
  }

  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    // Verlet-ish step: drag + gentle gravity for a "spark" feel.
    p.x  += p.vx;
    p.y  += p.vy;
    p.vx *= 0.93;
    p.vy  = p.vy * 0.93 + 0.18;
    p.life -= p.decay;

    if (p.life <= 0) {
      particles.splice(i, 1);
      continue;
    }

    ctx.shadowBlur  = profile.particleGlow;
    ctx.shadowColor = `hsl(${p.hue}, 100%, 65%)`;
    fill(p.hue, 90, 100, p.life);
    circle(p.x, p.y, p.size * p.life + 0.8);
  }

  ctx.shadowBlur = 0;
}
</script>
</body>
</html>
