<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>⚡ 어벤저스 메모리 게임</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      margin: 0; padding: 0; box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    /* ── html/body: 화면 꽉 채우되 스크롤 없음 ── */
    html {
      height: 100%;
    }
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: linear-gradient(135deg, #0d0d0d 0%, #1a0000 50%, #2a0a0a 100%);
      /* 화면 높이를 동적으로 (주소창 제외, 모바일 대응) */
      height: 100dvh;
      height: 100vh; /* fallback */
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow: hidden;
      padding: 8px 10px 6px;
      gap: 6px;
    }

    /* ── 고정 영역들 (flex-shrink: 0으로 찌그러지지 않음) ── */
    .header {
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
    }
    .marvel-badge {
      background: #ED1D24;
      color: #fff;
      font-size: 0.7rem;
      font-weight: 900;
      letter-spacing: 4px;
      padding: 3px 14px;
      border-radius: 4px;
      text-transform: uppercase;
    }
    h1 {
      color: #fff;
      font-size: clamp(1.1rem, 3vw, 1.8rem);
      font-weight: 900;
      letter-spacing: -0.5px;
      text-shadow: 0 0 20px rgba(237,29,36,0.6), 0 3px 10px rgba(0,0,0,.5);
    }

    /* ── 난이도 탭 ── */
    .difficulty-bar {
      flex-shrink: 0;
      display: flex;
      gap: 6px;
    }
    .diff-btn {
      padding: 6px 16px;
      border: 2px solid rgba(255,255,255,.25);
      border-radius: 50px;
      font-size: clamp(0.72rem, 1.5vw, 0.88rem);
      font-weight: 700;
      cursor: pointer;
      background: rgba(255,255,255,.08);
      color: rgba(255,255,255,.75);
      transition: all .2s;
      white-space: nowrap;
    }
    .diff-btn.active {
      background: #ED1D24;
      color: #fff;
      border-color: #ED1D24;
      box-shadow: 0 0 12px rgba(237,29,36,0.5);
    }
    .diff-btn:active { transform: scale(.95); }

    /* ── 스탯 바 ── */
    .stats {
      flex-shrink: 0;
      display: flex;
      gap: 8px;
    }
    .stat {
      background: rgba(255,255,255,.1);
      backdrop-filter: blur(4px);
      color: #fff;
      padding: 5px 14px;
      border-radius: 50px;
      font-size: clamp(0.75rem, 1.5vw, 0.9rem);
      font-weight: 700;
      min-width: 90px;
      text-align: center;
      border: 1px solid rgba(255,255,255,.15);
    }

    /* ── 카드 그리드: 남은 공간을 모두 차지 ── */
    .grid-wrapper {
      flex: 1;
      min-height: 0;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* grid 크기·열·행은 JS가 동적으로 결정 */
    .grid {
      display: grid;
      gap: 6px; /* JS에서도 참조하므로 맞춰둠 */
    }

    /* ── 카드: 크기는 JS가 결정, 세로 > 가로 보장 ── */
    .card {
      cursor: pointer;
      perspective: 800px;
    }
    .card-inner {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform .45s cubic-bezier(.4,0,.2,1);
      border-radius: 12px;
    }
    .card.flipped .card-inner { transform: rotateY(180deg); }
    .card.matched .card-inner { transform: rotateY(180deg); }

    .card-face {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 14px rgba(0,0,0,.4);
      overflow: hidden;
    }

    /* 앞면 */
    .card-front {
      background: linear-gradient(145deg, #1a1a2e, #16213e);
      border: 1.5px solid rgba(255,255,255,.1);
    }
    .card-front-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    .shield-icon {
      font-size: clamp(1.4rem, 3.5vw, 2.8rem);
      filter: drop-shadow(0 0 6px rgba(237,29,36,0.7));
    }
    .card-front-text {
      color: rgba(255,255,255,.35);
      font-size: clamp(0.45rem, 0.9vw, 0.65rem);
      font-weight: 700;
      letter-spacing: 2px;
    }

    /* 뒷면: 이미지 + 이름 */
    .card-back {
      background: #fff;
      transform: rotateY(180deg);
      padding: 0;
      justify-content: flex-start;
    }
    .card-back img {
      width: 100%;
      height: 80%;
      object-fit: cover;
      object-position: top center;
      border-radius: 12px 12px 0 0;
      display: block;
      flex-shrink: 0;
    }
    .char-name {
      width: 100%;
      height: 20%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(0.45rem, 1vw, 0.7rem);
      font-weight: 900;
      color: #111;
      background: #f5f5f5;
      border-radius: 0 0 12px 12px;
      padding: 1px 3px;
      text-align: center;
      line-height: 1.2;
      word-break: keep-all;
    }

    /* 맞춘 카드 */
    .card.matched .card-back {
      box-shadow: 0 0 0 3px #FFD700, 0 4px 16px rgba(255,215,0,0.4);
    }
    .card.matched .char-name {
      background: #FFF8DC;
      color: #8B6914;
    }
    .card.matched .card-inner {
      animation: pop .4s ease;
    }
    @keyframes pop {
      0%   { transform: rotateY(180deg) scale(1); }
      45%  { transform: rotateY(180deg) scale(1.1); }
      100% { transform: rotateY(180deg) scale(1); }
    }

    /* 틀린 카드 흔들기 */
    .card.shake .card-inner {
      animation: shake .4s ease;
    }
    @keyframes shake {
      0%,100% { transform: rotateY(180deg) translateX(0); }
      25%      { transform: rotateY(180deg) translateX(-7px); }
      75%      { transform: rotateY(180deg) translateX(7px); }
    }

    /* ── 다시하기 버튼 ── */
    .restart-btn {
      flex-shrink: 0;
      padding: 8px 36px;
      font-size: clamp(0.8rem, 1.5vw, 1rem);
      font-weight: 700;
      background: #ED1D24;
      color: #fff;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(237,29,36,.4);
      transition: transform .1s;
    }
    .restart-btn:active { transform: scale(.95); }

    /* ── 승리 오버레이 ── */
    .win-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.75);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }
    .win-overlay.show { display: flex; }

    .win-box {
      background: linear-gradient(135deg, #1a0000 0%, #3d0000 100%);
      border: 2px solid #ED1D24;
      border-radius: 24px;
      padding: 36px 52px;
      text-align: center;
      color: #fff;
      box-shadow: 0 0 40px rgba(237,29,36,.5), 0 20px 60px rgba(0,0,0,.6);
      animation: zoomIn .45s cubic-bezier(.34,1.56,.64,1);
      max-width: 90vw;
    }
    @keyframes zoomIn {
      from { transform: scale(.6); opacity: 0; }
      to   { transform: scale(1);  opacity: 1; }
    }
    .win-emoji   { font-size: 4rem; display: block; margin-bottom: 8px; }
    .win-title   { font-size: clamp(1.6rem, 4vw, 2.5rem); font-weight: 900; margin-bottom: 6px;
                   text-shadow: 0 0 20px rgba(237,29,36,.8); }
    .win-subtitle{ font-size: 1.05rem; opacity: .85; margin-bottom: 24px; }
    .win-actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    .win-btn {
      padding: 12px 32px;
      font-size: 1rem;
      font-weight: 700;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: transform .1s;
    }
    .win-btn.same     { background: rgba(255,255,255,.15); color: #fff; border: 2px solid rgba(255,255,255,.3); }
    .win-btn.hard-btn { background: #ED1D24; color: #fff; box-shadow: 0 4px 14px rgba(237,29,36,.5); }
    .win-btn:active { transform: scale(.95); }

    /* ── 컨페티 ── */
    .confetti-layer {
      position: fixed; inset: 0;
      pointer-events: none;
      z-index: 199;
    }
    .dot {
      position: absolute;
      top: -12px;
      border-radius: 2px;
      animation: fall linear forwards;
    }
    @keyframes fall {
      to { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }
  </style>
</head>
<body>

  <!-- 헤더 -->
  <div class="header">
    <div class="marvel-badge">MARVEL</div>
    <h1>⚡ 어벤저스 메모리 게임</h1>
  </div>

  <!-- 난이도 선택 -->
  <div class="difficulty-bar">
    <button class="diff-btn active" onclick="setDiff('easy')">🌱 쉬움 (8쌍)</button>
    <button class="diff-btn"        onclick="setDiff('normal')">⭐ 보통 (12쌍)</button>
    <button class="diff-btn"        onclick="setDiff('hard')">🔥 어려움 (15쌍)</button>
  </div>

  <!-- 스탯 -->
  <div class="stats">
    <div class="stat">⏱️ <span id="timer">0</span>초</div>
    <div class="stat">🎯 <span id="moves">0</span>번</div>
    <div class="stat">✅ <span id="matched">0</span> / <span id="total">8</span></div>
  </div>

  <!-- 카드 그리드 래퍼 (남은 공간 전부 사용) -->
  <div class="grid-wrapper">
    <div class="grid easy" id="grid"></div>
  </div>

  <!-- 다시하기 -->
  <button class="restart-btn" onclick="startGame()">🔄 다시하기</button>

  <!-- 승리 화면 -->
  <div class="win-overlay" id="winOverlay">
    <div class="win-box">
      <span class="win-emoji">🏆</span>
      <div class="win-title">어벤저스 완성!</div>
      <div class="win-subtitle" id="winMsg"></div>
      <div class="win-actions">
        <button class="win-btn same"     onclick="startGame()">다시 해볼래요!</button>
        <button class="win-btn hard-btn" onclick="nextDiff()">더 어렵게!</button>
      </div>
    </div>
  </div>

  <!-- 컨페티 레이어 -->
  <div class="confetti-layer" id="confettiLayer"></div>

<script>
/* ═══════════════════════════════════════════
   MCU 캐릭터 데이터
═══════════════════════════════════════════ */
const ALL_CHARS = [
  { id: 'ironman',       name: '아이언맨',        file: '아이언맨(토니 스타크).webp' },
  { id: 'captain',       name: '캡틴 아메리카',   file: '캡틴 아메리카(스티브 로저스).webp' },
  { id: 'thor',          name: '토르',            file: '토르.webp' },
  { id: 'hulk',          name: '헐크',            file: '헐크(브루스 배너).webp' },
  { id: 'blackwidow',    name: '블랙 위도우',     file: '블랙 위도우(나타샤 로마노프).webp' },
  { id: 'hawkeye',       name: '호크아이',        file: '호크아이(클린트 바튼).webp' },
  { id: 'spiderman',     name: '스파이더맨',      file: '스파이더맨(피터 파커).webp' },
  { id: 'blackpanther',  name: '블랙 팬서',       file: '블랙 팬서(트찰라).webp' },
  { id: 'drstrange',     name: '닥터 스트레인지', file: '닥터 스트레인지.webp' },
  { id: 'captainmarvel', name: '캡틴 마블',       file: '캡틴 마블(캐럴 댄버스).webp' },
  { id: 'scarletwitch',  name: '스칼렛 위치',     file: '스칼렛 위치(완다 막시모프).webp' },
  { id: 'antman',        name: '앤트맨',          file: '앤트맨(스콧 랭).webp' },
  { id: 'starlord',      name: '스타로드',        file: '스타로드(피터 퀼).webp' },
  { id: 'groot',         name: '그루트',          file: '그루트.webp' },
  { id: 'rocket',        name: '로켓',            file: '로켓.webp' },
  { id: 'nebula',        name: '네뷸라',          file: '네뷸라.webp' },
  { id: 'drax',          name: '드랙스',          file: '드랙스.webp' },
  { id: 'mantis',        name: '맨티스',          file: '맨티스.webp' },
  { id: 'valkyrie',      name: '발키리',          file: '발키리(브룬힐데).webp' },
  { id: 'falcon',        name: '팔콘',            file: '팔콘(샘 윌슨).webp' },
  { id: 'warmachine',    name: '워 머신',         file: '워 머신(제임스 로즈).webp' },
  { id: 'wintersoldier', name: '윈터 솔져',       file: '윈터 솔져(버키 반즈).webp' },
  { id: 'wasp',          name: '와스프',          file: '와스프(호프 밴 다인).webp' },
  { id: 'okoye',         name: '오코예',          file: '오코예.webp' },
  { id: 'shuri',         name: '슈리',            file: '슈리.webp' },
  { id: 'wong',          name: '웡',              file: '웡.webp' },
  { id: 'rescue',        name: '레스큐',          file: '레스큐(페퍼 포츠).webp' },
  { id: 'thanos',        name: '타노스',          file: '타노스.webp' },
  { id: 'korg',          name: '코르그',          file: '코르그.webp' },
  { id: 'happy',         name: '해피 호건',       file: '해피 호건.webp' },
];

const IMAGE_BASE = '이미지/';

const DIFF_CONFIG = {
  easy:   { pairs: 8,  cols: 4, label: '쉬움' },   // 4열 × 4행  (열 = 행)
  normal: { pairs: 12, cols: 6, label: '보통' },   // 6열 × 4행  (열 > 행)
  hard:   { pairs: 15, cols: 6, label: '어려움' }, // 6열 × 5행  (열 > 행)
};
const DIFF_ORDER = ['easy', 'normal', 'hard'];

let currentDiff = 'easy';
let flipped     = [];
let matchedCount= 0;
let totalPairs  = 0;
let moves       = 0;
let timerSec    = 0;
let timerID     = null;
let locked      = false;
let started     = false;
let audioCtx    = null;

/* ═══════════════════════════════════════════
   난이도 변경
═══════════════════════════════════════════ */
function setDiff(diff) {
  currentDiff = diff;
  document.querySelectorAll('.diff-btn').forEach((btn, i) => {
    btn.classList.toggle('active', DIFF_ORDER[i] === diff);
  });
  startGame();
}

function nextDiff() {
  const idx  = DIFF_ORDER.indexOf(currentDiff);
  const next = DIFF_ORDER[Math.min(idx + 1, DIFF_ORDER.length - 1)];
  setDiff(next);
}

/* ═══════════════════════════════════════════
   게임 시작
═══════════════════════════════════════════ */
function startGame() {
  clearInterval(timerID);
  timerSec = moves = matchedCount = 0;
  flipped = []; locked = false; started = false;
  document.getElementById('winOverlay').classList.remove('show');
  document.getElementById('confettiLayer').innerHTML = '';
  document.getElementById('timer').textContent   = '0';
  document.getElementById('moves').textContent   = '0';
  document.getElementById('matched').textContent = '0';

  const cfg = DIFF_CONFIG[currentDiff];
  totalPairs = cfg.pairs;
  document.getElementById('total').textContent = totalPairs;

  const grid = document.getElementById('grid');
  grid.className = `grid ${currentDiff}`;

  const selected = shuffle(ALL_CHARS).slice(0, totalPairs);
  const deck     = shuffle([...selected, ...selected]);

  grid.innerHTML = '';
  deck.forEach(char => {
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.charid = char.id;

    card.innerHTML = `
      <div class="card-inner">
        <div class="card-face card-front">
          <div class="card-front-inner">
            <span class="shield-icon">🛡️</span>
            <span class="card-front-text">MARVEL</span>
          </div>
        </div>
        <div class="card-face card-back">
          <img src="${IMAGE_BASE}${char.file}" alt="${char.name}" loading="eager" />
          <span class="char-name">${char.name}</span>
        </div>
      </div>`;

    card.addEventListener('click', () => onCardClick(card));
    grid.appendChild(card);
  });

  /* 카드 렌더 후 크기 계산 (DOM 반영 대기) */
  requestAnimationFrame(resizeCards);
}

/* ═══════════════════════════════════════════
   카드 클릭
═══════════════════════════════════════════ */
function onCardClick(card) {
  unlockAudio();
  if (!started) { started = true; startTimer(); }
  if (locked)                              return;
  if (card.classList.contains('flipped'))  return;
  if (card.classList.contains('matched'))  return;
  if (flipped.length >= 2)                 return;

  playSound('flip');
  card.classList.add('flipped');
  flipped.push(card);

  if (flipped.length === 2) {
    moves++;
    document.getElementById('moves').textContent = moves;
    checkMatch();
  }
}

function checkMatch() {
  const [a, b] = flipped;
  if (a.dataset.charid === b.dataset.charid) {
    playSound('match');
    a.classList.add('matched');
    b.classList.add('matched');
    matchedCount++;
    document.getElementById('matched').textContent = matchedCount;
    flipped = [];
    if (matchedCount === totalPairs) {
      clearInterval(timerID);
      setTimeout(showWin, 700);
    }
  } else {
    locked = true;
    playSound('nomatch');
    setTimeout(() => { a.classList.add('shake'); b.classList.add('shake'); }, 0);
    setTimeout(() => {
      a.classList.remove('flipped', 'shake');
      b.classList.remove('flipped', 'shake');
      flipped = [];
      locked  = false;
    }, 900);
  }
}

/* ═══════════════════════════════════════════
   타이머
═══════════════════════════════════════════ */
function startTimer() {
  timerID = setInterval(() => {
    timerSec++;
    document.getElementById('timer').textContent = timerSec;
  }, 1000);
}

/* ═══════════════════════════════════════════
   승리 화면
═══════════════════════════════════════════ */
function showWin() {
  playSound('win');
  const stars = timerSec < 30 ? '⭐⭐⭐' : timerSec < 60 ? '⭐⭐' : '⭐';
  document.getElementById('winMsg').textContent =
    `${stars}  ${timerSec}초 · ${moves}번 도전  ${stars}`;
  document.getElementById('winOverlay').classList.add('show');

  const hardBtn = document.querySelector('.win-btn.hard-btn');
  hardBtn.style.display = currentDiff === 'hard' ? 'none' : '';
  spawnConfetti();
}

/* ═══════════════════════════════════════════
   컨페티
═══════════════════════════════════════════ */
function spawnConfetti() {
  const layer  = document.getElementById('confettiLayer');
  layer.innerHTML = '';
  const colors = ['#ED1D24','#FFD700','#C0C0C0','#1e3a5f','#ff6b35','#ffffff','#8B0000'];
  for (let i = 0; i < 100; i++) {
    const d   = document.createElement('div');
    const sz  = 8 + Math.random() * 10;
    const dur = 2.2 + Math.random() * 2;
    d.className = 'dot';
    Object.assign(d.style, {
      left:             `${Math.random() * 100}%`,
      width:            `${sz}px`,
      height:           `${sz * (Math.random() > .5 ? 1 : 2)}px`,
      background:       colors[Math.floor(Math.random() * colors.length)],
      borderRadius:     Math.random() > .4 ? '50%' : '2px',
      animationDelay:   `${Math.random() * 1.2}s`,
      animationDuration:`${dur}s`,
    });
    layer.appendChild(d);
  }
}

/* ═══════════════════════════════════════════
   사운드
═══════════════════════════════════════════ */
function unlockAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function playSound(type) {
  if (!audioCtx) return;
  const ctx = audioCtx;
  const t   = ctx.currentTime;
  const beep = (freq, start, dur, vol = .25, shape = 'sine') => {
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.type = shape;
    o.frequency.value = freq;
    g.gain.setValueAtTime(vol, t + start);
    g.gain.exponentialRampToValueAtTime(.001, t + start + dur);
    o.connect(g); g.connect(ctx.destination);
    o.start(t + start); o.stop(t + start + dur + .05);
  };

  if (type === 'flip') {
    beep(500, 0, .1, .12);
  } else if (type === 'match') {
    [[523,.0],[659,.12],[784,.24],[1047,.36]].forEach(([f,s]) => beep(f, s, .2, .25));
  } else if (type === 'nomatch') {
    beep(260, 0, .12, .2, 'sawtooth');
    beep(220, .14, .15, .2, 'sawtooth');
  } else if (type === 'win') {
    [[523,.0],[659,.14],[784,.28],[1047,.42],[1319,.56]].forEach(([f,s]) => beep(f, s, .3, .3));
    setTimeout(() => {
      [[1047,0],[784,.1],[659,.2],[523,.3]].forEach(([f,s]) => beep(f, s, .2, .2));
    }, 800);
  }
}

/* ═══════════════════════════════════════════
   유틸
═══════════════════════════════════════════ */
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

/* ═══════════════════════════════════════════
   카드 크기 동적 계산 (세로 > 가로 보장)
   - 세로 우선: 가용 높이를 row수로 나눠 셀 높이 결정
   - 가로 검증: 셀 너비가 wrapper 너비 초과하면 가로 기준으로 재계산
   - 비율: 2 : 3 (가로 : 세로)
═══════════════════════════════════════════ */
const CARD_RATIO = 2 / 3;   // 가로/세로 = 2/3  →  세로가 더 길다
const GAP_PX     = 6;

function resizeCards() {
  const grid    = document.getElementById('grid');
  const wrapper = grid.parentElement;
  if (!grid.children.length) return;

  const cfg  = DIFF_CONFIG[currentDiff];
  const cols  = cfg.cols;
  const cards = cfg.pairs * 2;
  const rows  = Math.ceil(cards / cols);

  const wH = wrapper.clientHeight;
  const wW = wrapper.clientWidth;

  /* ① 세로 기준으로 셀 높이 계산 */
  const cellHfromH = (wH - GAP_PX * (rows - 1)) / rows;
  const cellWfromH = cellHfromH * CARD_RATIO;

  /* ② 그 너비가 wrapper를 초과하면 가로 기준으로 재계산 */
  const maxCellW   = (wW - GAP_PX * (cols - 1)) / cols;
  const cellW      = Math.min(cellWfromH, maxCellW);
  const cellH      = cellW / CARD_RATIO;   /* 항상 세로 > 가로 */

  grid.style.gridTemplateColumns = `repeat(${cols}, ${cellW}px)`;
  grid.style.gridTemplateRows    = `repeat(${rows}, ${cellH}px)`;
  grid.style.gap                 = `${GAP_PX}px`;
}

/* 리사이즈 대응 */
let _resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(_resizeTimer);
  _resizeTimer = setTimeout(resizeCards, 80);
});

startGame();
</script>
