const canvas = document.getElementById('c');

const W = 480, H = 700;

/* ── DPR (고해상도 디스플레이 대응) ── */
const DPR = Math.min(window.devicePixelRatio || 1, 3);

/* ── roundRect 폴리필 ── */
if(!CanvasRenderingContext2D.prototype.roundRect){
  CanvasRenderingContext2D.prototype.roundRect = function(x,y,w,h,r){
    r = Math.min(r, w/2, h/2);
    this.beginPath();
    this.moveTo(x+r,y); this.lineTo(x+w-r,y);
    this.arcTo(x+w,y,x+w,y+r,r); this.lineTo(x+w,y+h-r);
    this.arcTo(x+w,y+h,x+w-r,y+h,r); this.lineTo(x+r,y+h);
    this.arcTo(x,y+h,x,y+h-r,r); this.lineTo(x,y+r);
    this.arcTo(x,y,x+r,y,r); this.closePath(); return this;
  };
}

/* ── 반응형 리사이즈 (CSS 크기 + 버퍼를 동시에 갱신 → 항상 선명) ── */
function resize(){
  const s = Math.min(window.innerWidth/W, window.innerHeight/H, 1.3);
  const cssW = Math.round(W * s);
  const cssH = Math.round(H * s);
  canvas.style.width  = cssW + 'px';
  canvas.style.height = cssH + 'px';
  /* 버퍼 = CSS 크기 × DPR → 물리 픽셀 1:1 대응 */
  canvas.width  = cssW * DPR;
  canvas.height = cssH * DPR;
  /* 변환 행렬: 논리 좌표(W×H)를 DPR×s 배 물리 픽셀로 */
  ctx.setTransform(DPR * s, 0, 0, DPR * s, 0, 0);
  const marginW = Math.max(0, (window.innerWidth - cssW) / 2 - 4);
  const sL = document.getElementById('side-left');
  const sR = document.getElementById('side-right');
  if(sL && sR){
    if(marginW > 40){
      sL.style.display = sR.style.display = 'flex';
      sL.style.width = sR.style.width = marginW + 'px';
      sL.style.left = '0'; sR.style.right = '0';
    } else {
      sL.style.display = sR.style.display = 'none';
    }
  }
}
window.addEventListener('resize', resize);
resize();

/* ── 스프라이트 로더 ── */
const SP = {};
const alphaMasks = {};  // `${key}_${dir}_${frame}` → Uint8Array (소스 해상도)
let loaded = 0, total = 1 + VILLAIN_DATA.length;

function computeAlphaMask(key, img, cw, ch){
  cw = cw || 1; ch = ch || 1;
  const mw = CELL * cw, mh = CELL * ch;
  const oc = document.createElement('canvas');
  oc.width = mw; oc.height = mh;
  const c = oc.getContext('2d');
  for(let dir = 0; dir < 3; dir++){
    for(let frame = 0; frame < 3; frame++){
      c.clearRect(0, 0, mw, mh);
      c.drawImage(img, frame * mw, dir * mh, mw, mh, 0, 0, mw, mh);
      const data = c.getImageData(0, 0, mw, mh).data;
      const mask = new Uint8Array(mw * mh);
      for(let i = 0; i < mw * mh; i++) mask[i] = data[i * 4 + 3] > 16 ? 1 : 0;
      alphaMasks[`${key}_${dir}_${frame}`] = mask;
    }
  }
}

function loadImg(key, src, cw, ch){
  const img = new Image();
  img.onload = () => { SP[key] = img; loaded++; computeAlphaMask(key, img, cw, ch); };
  img.onerror = () => loaded++;
  img.src = src;
}
VILLAIN_DATA.forEach(v => loadImg(v.key, v.src));

/* ── 상수 ── */

}
function goToStart(){ state = 'start'; updateBackBtn(); }
/* 현재 선택된 히어로 인덱스 — 선언 후 바로 초기 랜덤 로드 */

function pickRandomHero(){
  heroIdx = Math.floor(Math.random() * HERO_COUNT);
  const h = HEROES[heroIdx];
  if(!SP[h.key]){
    loadImg(h.key, h.src, h.cw, h.ch);
  }
}

function initGame(){
  pickRandomHero();
  score=0; hp=3; eTimer=0; bTimer=0; timeLeft=GAME_TIME;
  enemies=[]; blocks=[]; particles=[]; popups=[];
  hero = { x: W/2-SPR/2, y: HERO_Y, frame:0, ftick:0, dir:DIR_DOWN, inv:0 };
  state = 'playing';
  updateBackBtn();
}

/* ── 스프라이트 그리기 ── */
function drawChar(img, x, y, dir, frame){
  if(!img) return;
  ctx.drawImage(img, frame*CELL, dir*CELL, CELL, CELL, x, y, SPR, SPR);
}

/* cw/ch 배율을 반영한 히어로 전용 드로우
 * ch:2 (tall) → 96×192 소스, SPR×SPR*2 출력, y를 SPR 위로 올려 발 위치 유지
 * cw:2 (wide) → 192×96 소스, SPR*2×SPR 출력, x를 SPR/2 왼쪽으로 당겨 중앙 정렬 */
function drawHero(img, x, y, dir, frame, cw, ch){
  if(!img) return;
  cw = cw || 1;  ch = ch || 1;
  const sw = CELL * cw,  sh = CELL * ch;   // 소스 크기
  const dw = SPR  * cw,  dh = SPR  * ch;   // 출력 크기
  const sx = frame * sw, sy = dir   * sh;   // 소스 좌표
  const dx = x - SPR * (cw - 1) / 2;       // 수평 중앙 보정 (wide)
  const dy = y - SPR * (ch - 1);            // 수직 하단 고정 (tall)
  ctx.drawImage(img, sx, sy, sw, sh, dx, dy, dw, dh);
}

/* ── 입력 ── */
const K = {};
document.addEventListener('keydown', e => { K[e.key]=true; if(state!=='playing') initGame(); });
document.addEventListener('keyup', e => K[e.key] = false);
let touchX = null;
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  if(state === 'playing'){
    const r = canvas.getBoundingClientRect();
    touchX = (e.touches[0].clientX - r.left) * (W / r.width);
  }
}, {passive:false});
canvas.addEventListener('touchend', e => {
  e.preventDefault();
  touchX = null;
  // 버튼 영역 탭 감지
  if(state === 'start' || state === 'gameover'){
    const t = e.changedTouches[0];
    canvas.dispatchEvent(new MouseEvent('click', {clientX:t.clientX, clientY:t.clientY, bubbles:true}));
  }
}, {passive:false});
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const r = canvas.getBoundingClientRect();
  touchX = (e.touches[0].clientX - r.left) * (W / r.width);
}, {passive:false});

// 캔버스 클릭 → 상태별 버튼 히트 감지
canvas.addEventListener('click', ev => {
  const r = canvas.getBoundingClientRect();
  const mx = (ev.clientX - r.left) * (W / r.width);
  const my = (ev.clientY - r.top) * (H / r.height);
  if(state === 'start'){
    // "▶ 게임 시작" 버튼: x=W/2-95~W/2+95, y=nameY+90~nameY+140 (nameY=160)
    if(mx >= W/2-95 && mx <= W/2+95 && my >= 250 && my <= 300) initGame();
  } else if(state === 'gameover'){
    const by = 150;
    if(mx >= W/2-95 && mx <= W/2+95){
      if(my >= by+218 && my <= by+266){ initGame(); }
      if(my >= by+276 && my <= by+324){ goToStart(); }
    }
  }
});

/* ── 스폰 ── */
const VKEYS = VILLAIN_DATA.map(v => v.key);
function spawnEnemy(){
  const vkey = VKEYS[Math.floor(Math.random()*VKEYS.length)];
  /* 빌런별 고유 속도 보정
     ultron    → +80 (최고속)
     ultronbot → +40 (준고속)
     나머지     → +0  (보통)  */
  const SPEED_BONUS = { ultron: 80, ultronbot: 40 };
  const bonus = SPEED_BONUS[vkey] || 0;
  enemies.push({
    x: Math.random() * MAX_X,
    y: -SPR,
    speed: 90 + Math.min(score*5, 140) + Math.random()*30 + bonus,
    frame:0, ftick:0, dead:false,
    key: vkey
  });
}
function spawnBlock(){
  const bw = 80 + Math.random()*80;
  blocks.push({ x: Math.random()*(W-bw), y:-40, w:bw, h:26, speed:60+Math.random()*50, hit:false });
}

/* ── 파티클 / 팝업 ── */
function burst(cx, cy, color, n){
  for(let i=0;i<n;i++){
    const a = Math.random()*Math.PI*2, s = 90+Math.random()*140;
    particles.push({x:cx,y:cy,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:0.7+Math.random()*0.5,max:1.2,color});
  }
}
function popup(x, y, t){ popups.push({x,y,t,life:1.1}); }

/* ── 충돌 ── */

// 스프라이트의 월드 공간 바운딩 사각형 (drawHero 와 동일한 오프셋 적용)
function spriteRect(x, y, cw, ch){
  cw = cw || 1; ch = ch || 1;
  return {
    left: x - SPR * (cw - 1) / 2,
    top:  y - SPR * (ch - 1),
    w:    SPR * cw,
    h:    SPR * ch
  };
}

// 스프라이트 vs 스프라이트 픽셀 정밀 충돌
// 소스 해상도(CELL 단위) 알파 마스크로 투명 픽셀 제외
function pixelHits(ax, ay, aKey, aDir, aFrame, acw, ach,
                   bx, by, bKey, bDir, bFrame, bcw, bch){
  acw = acw || 1; ach = ach || 1;
  bcw = bcw || 1; bch = bch || 1;
  const ar = spriteRect(ax, ay, acw, ach);
  const br = spriteRect(bx, by, bcw, bch);
  // 1단계: AABB 교차 확인
  const ix0 = Math.max(ar.left, br.left);
  const iy0 = Math.max(ar.top,  br.top);
  const ix1 = Math.min(ar.left + ar.w, br.left + br.w);
  const iy1 = Math.min(ar.top  + ar.h, br.top  + br.h);
  if(ix0 >= ix1 || iy0 >= iy1) return false;
  // 2단계: 알파 마스크 교차 확인 (마스크 미준비 시 AABB 결과 반환)
  const maskA = alphaMasks[`${aKey}_${aDir}_${aFrame}`];
  const maskB = alphaMasks[`${bKey}_${bDir}_${bFrame}`];
  if(!maskA || !maskB) return true;
  const awSrc = CELL * acw;
  const bwSrc = CELL * bcw;
  const STEP = 4;  // 월드 픽셀 4px 간격으로 샘플링 (성능 / 정밀도 균형)
  for(let wx = ix0; wx < ix1; wx += STEP){
    for(let wy = iy0; wy < iy1; wy += STEP){
      const axL = Math.floor((wx - ar.left) / SC);
      const ayL = Math.floor((wy - ar.top)  / SC);
      const bxL = Math.floor((wx - br.left) / SC);
      const byL = Math.floor((wy - br.top)  / SC);
      if(maskA[ayL * awSrc + axL] && maskB[byL * bwSrc + bxL]) return true;
    }
  }
  return false;
}

// 스프라이트 vs 직사각형 장애물 픽셀 충돌
function blockHits(hx, hy, hKey, hDir, hFrame, hcw, hch, bx, by, bw, bh){
  hcw = hcw || 1; hch = hch || 1;
  const hr = spriteRect(hx, hy, hcw, hch);
  // 1단계: AABB 교차 확인
  const ix0 = Math.max(hr.left, bx);
  const iy0 = Math.max(hr.top,  by);
  const ix1 = Math.min(hr.left + hr.w, bx + bw);
  const iy1 = Math.min(hr.top  + hr.h, by + bh);
  if(ix0 >= ix1 || iy0 >= iy1) return false;
  // 2단계: 히어로 알파 마스크 확인
  const mask = alphaMasks[`${hKey}_${hDir}_${hFrame}`];
  if(!mask) return true;
  const wSrc = CELL * hcw;
  const STEP = 4;
  for(let wx = ix0; wx < ix1; wx += STEP){
    for(let wy = iy0; wy < iy1; wy += STEP){
      const hxL = Math.floor((wx - hr.left) / SC);
      const hyL = Math.floor((wy - hr.top)  / SC);
      if(mask[hyL * wSrc + hxL]) return true;
    }
  }
  return false;
}

/* ══════════════════════════════════════
   그리기 함수들 — MCU 테마
══════════════════════════════════════ */

/* ── 공통 버튼 ── */
function drawBtn(x, y, w, h, label, color, textColor){
  textColor = textColor || '#fff';
  ctx.save();
  ctx.fillStyle = color;
  ctx.shadowBlur = 16; ctx.shadowColor = color;
  ctx.beginPath(); ctx.roundRect(x, y, w, h, h/2); ctx.fill();
  ctx.fillStyle = textColor; ctx.shadowBlur = 0;
  ctx.font = 'bold 15px ' + FONT_KR;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(label, x+w/2, y+h/2);
  ctx.restore();
}

/* ── 배경 ── */
function drawBG(){
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, '#0d0d0d');
  g.addColorStop(0.5, '#1a0000');
  g.addColorStop(1, '#2a0a0a');
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
  ctx.strokeStyle = 'rgba(237,29,36,0.05)'; ctx.lineWidth = 1;
  for(let x=0;x<W;x+=48){ ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
  for(let y=0;y<H;y+=48){ ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }
}

/* ── HUD ── */
function drawHUD(){
  ctx.fillStyle = 'rgba(0,0,0,0.78)'; ctx.fillRect(0, 0, W, HUD_H);
  ctx.strokeStyle = RED; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(0, HUD_H); ctx.lineTo(W, HUD_H); ctx.stroke();

  // 점수 (좌)
  ctx.fillStyle = '#FFD700'; ctx.font = 'bold 20px ' + FONT_KR;
  ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
  ctx.fillText('⭐ ' + score, 14, 34);

  // 하트 (우)
  let h = ''; for(let i=0;i<3;i++) h += (i<hp ? '❤️' : '🖤');
  ctx.font = '20px Arial'; ctx.textAlign = 'right';
  ctx.fillText(h, W-10, 34);

  // 타이머 (중앙)
  const t = Math.ceil(timeLeft);
  const urgent = t <= 10;
  ctx.save();
  if(urgent){ ctx.shadowBlur=16; ctx.shadowColor=RED; }
  ctx.fillStyle = urgent ? RED : 'rgba(255,255,255,0.9)';
  ctx.font = 'bold 16px ' + FONT_KR; ctx.textAlign = 'center';
  ctx.fillText('⏱ ' + t + '초', W/2, 33);
  ctx.restore();
}

/* ── 터치 힌트 ── */
function drawTouchHint(){
  ctx.fillStyle = 'rgba(237,29,36,0.06)';
  ctx.fillRect(0, H-BTM_H, W/2, BTM_H);
  ctx.fillRect(W/2, H-BTM_H, W/2, BTM_H);
  ctx.strokeStyle = 'rgba(237,29,36,0.18)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(W/2, H-BTM_H); ctx.lineTo(W/2, H); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0, H-BTM_H); ctx.lineTo(W, H-BTM_H); ctx.stroke();
  ctx.fillStyle = 'rgba(255,255,255,0.28)'; ctx.font = '16px Arial';
  ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
  ctx.fillText('◀ 왼쪽', W/4, H-18);
  ctx.fillText('오른쪽 ▶', W*3/4, H-18);
}

/* ── 시작 화면 ── */
function drawStart(){
  // MARVEL 배지
  const bw = 106, bh = 26, bx = W/2-bw/2;
  ctx.fillStyle = RED;
  ctx.beginPath(); ctx.roundRect(bx, 46, bw, bh, 4); ctx.fill();
  ctx.fillStyle = '#fff'; ctx.font = 'bold 10px Arial';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('M A R V E L', W/2, 46+bh/2);

  // 타이틀
  ctx.save();
  ctx.shadowBlur = 28; ctx.shadowColor = 'rgba(237,29,36,0.75)';
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 30px ' + FONT_KR; ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
  ctx.fillText('⚡ 히어로 런', W/2, 118);
  ctx.restore();

  // 조작 안내
  const nameY = 160;
  ctx.fillStyle = 'rgba(255,255,255,0.68)'; ctx.font = '14px ' + FONT_KR;
  ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
  ctx.fillText('← → 키 또는 화면 좌우 터치로 이동', W/2, nameY);
  ctx.fillStyle = 'rgba(255,255,255,0.5)'; ctx.font = '13px ' + FONT_KR;
  ctx.fillText('빌런에게 부딪히면 처치!  빨간 장애물은 피하세요', W/2, nameY+28);

  // 최고 점수
  if(hiScore > 0){
    ctx.fillStyle = 'rgba(255,215,0,0.65)'; ctx.font = '14px ' + FONT_KR;
    ctx.fillText('🏆 최고 점수: ' + hiScore, W/2, nameY+62);
  }

  drawBtn(W/2-95, nameY+90, 190, 50, '▶  게임 시작', RED);
}

/* ── 게임 업데이트 & 그리기 ── */
function updateAndDraw(dt){
  const goL = K['ArrowLeft']||K['a']||K['A']||(touchX!==null&&touchX<W/2);
  const goR = K['ArrowRight']||K['d']||K['D']||(touchX!==null&&touchX>=W/2);
  const SPD = 270;
  if(goL){ hero.x -= SPD*dt; hero.dir = DIR_LEFT; }
  else if(goR){ hero.x += SPD*dt; hero.dir = DIR_RIGHT; }
  else hero.dir = DIR_DOWN;
  hero.x = Math.max(0, Math.min(MAX_X, hero.x));
  hero.ftick += dt; if(hero.ftick > 0.13){ hero.ftick=0; hero.frame=(hero.frame+1)%3; }
  if(hero.inv > 0) hero.inv -= dt;

  // 적 스폰
  const eInt = Math.max(0.6, 2.0 - score*0.04);
  eTimer += dt; if(eTimer >= eInt){ eTimer=0; spawnEnemy(); }
  // 장애물 스폰
  const bInt = Math.max(2.5, 5.5 - score*0.05);
  bTimer += dt; if(bTimer >= bInt){ bTimer=0; spawnBlock(); }

  // 현재 히어로 데이터 (충돌 판정에서 재사용)
  const _hd = HEROES[heroIdx];

  // 적 이동 & 충돌
  for(const e of enemies){
    e.y += e.speed*dt;
    e.ftick += dt; if(e.ftick > 0.17){ e.ftick=0; e.frame=(e.frame+1)%3; }
    if(!e.dead && hero.inv<=0 && pixelHits(
        hero.x, hero.y, _hd.key, hero.dir, hero.frame, _hd.cw||1, _hd.ch||1,
        e.x, e.y, e.key, DIR_DOWN, e.frame, 1, 1)){
      e.dead = true; score++;
      if(score > hiScore){ hiScore = score; localStorage.setItem('mcu_hs_run', hiScore); }
      burst(e.x+SPR/2, e.y+SPR/2, '#FFD700', 14);
      popup(e.x+SPR/2, e.y, '+1 ⭐');
    }
  }
  enemies = enemies.filter(e => e.y < H+SPR && !e.dead);

  // 타이머
  timeLeft -= dt;
  if(timeLeft <= 0){ timeLeft=0; state='gameover'; updateBackBtn(); return; }

  // 장애물 이동 & 충돌
  for(const b of blocks){
    b.y += b.speed*dt;
    if(!b.hit && hero.inv<=0 && blockHits(
        hero.x, hero.y, _hd.key, hero.dir, hero.frame, _hd.cw||1, _hd.ch||1,
        b.x, b.y, b.w, b.h)){
      b.hit = true; hp--; hero.inv = 1.8;
      burst(hero.x+SPR/2, hero.y+SPR/2, '#ff3030', 10);
      if(hp <= 0){ state='gameover'; updateBackBtn(); return; }
    }
  }
  blocks = blocks.filter(b => b.y < H+80);

  // 파티클
  for(const p of particles){ p.x+=p.vx*dt; p.y+=p.vy*dt; p.life-=dt; p.vy+=200*dt; }
  particles = particles.filter(p => p.life > 0);
  for(const p of popups){ p.y -= 50*dt; p.life -= dt; }
  popups = popups.filter(p => p.life > 0);

  /* ── 장애물 그리기 ── */
  for(const b of blocks){
    ctx.save();
    ctx.fillStyle = b.hit ? 'rgba(255,80,80,0.3)' : 'rgba(200,20,30,0.88)';
    ctx.shadowBlur = 10; ctx.shadowColor = RED;
    ctx.beginPath(); ctx.roundRect(b.x, b.y, b.w, b.h, 5); ctx.fill();
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#fff'; ctx.font = 'bold 11px Arial';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('⚠ 장애물', b.x+b.w/2, b.y+b.h/2);
    ctx.restore();
  }

  /* ── 적 그리기 ── */
  for(const e of enemies){
    if(SP[e.key]) drawChar(SP[e.key], e.x, e.y, DIR_DOWN, e.frame);
    else { ctx.fillStyle='#ff4444'; ctx.fillRect(e.x,e.y,SPR,SPR); }
  }

  /* ── 파티클 ── */
  for(const p of particles){
    ctx.save(); ctx.globalAlpha = Math.max(0, p.life/p.max);
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x,p.y,4,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }

  /* ── 히어로 (무적 중 깜빡) ── */
  if(hero.inv <= 0 || Math.floor(hero.inv*8)%2 === 0){
    if(SP[_hd.key]) drawHero(SP[_hd.key], hero.x, hero.y, hero.dir, hero.frame, _hd.cw, _hd.ch);
    else { ctx.fillStyle='#4488ff'; ctx.fillRect(hero.x,hero.y,SPR,SPR); }
  }
  // 히어로 이름
  ctx.fillStyle = 'rgba(255,210,0,0.9)'; ctx.font = 'bold 13px ' + FONT_KR;
  ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
  ctx.fillText(HEROES[heroIdx].name, hero.x+SPR/2, hero.y+SPR+16);

  /* ── 팝업 ── */
  for(const p of popups){
    ctx.save(); ctx.globalAlpha = p.life;
    ctx.fillStyle = '#FFD700'; ctx.font = 'bold 20px Arial';
    ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
    ctx.fillText(p.t, p.x, p.y);
    ctx.restore();
  }

  drawHUD();
  drawTouchHint();
}

/* ── 게임오버 ── */
function drawGameOver(){
  ctx.fillStyle = 'rgba(0,0,0,0.82)'; ctx.fillRect(0, 0, W, H);

  const bx=55, by=150, bw=W-110, bh=330;
  ctx.fillStyle = 'rgba(26,0,0,0.96)';
  ctx.beginPath(); ctx.roundRect(bx, by, bw, bh, 20); ctx.fill();
  ctx.save(); ctx.strokeStyle=RED; ctx.lineWidth=2;
  ctx.beginPath(); ctx.roundRect(bx, by, bw, bh, 20); ctx.stroke();
  ctx.restore();

  // GAME OVER
  ctx.save();
  ctx.shadowBlur=24; ctx.shadowColor=RED;
  ctx.fillStyle=RED; ctx.font='bold 40px ' + FONT_KR;
  ctx.textAlign='center'; ctx.textBaseline='alphabetic';
  ctx.fillText('GAME OVER', W/2, by+70);
  ctx.restore();

  const reason = timeLeft<=0 ? '⏱ 제한 시간 종료!' : '💔 HP 소진';
  ctx.fillStyle='rgba(255,255,255,0.68)'; ctx.font='15px ' + FONT_KR;
  ctx.textAlign='center'; ctx.textBaseline='alphabetic';
  ctx.fillText(reason, W/2, by+108);

  ctx.fillStyle='#FFD700'; ctx.font='bold 28px ' + FONT_KR;
  ctx.fillText('점수: ' + score, W/2, by+152);

  if(score>0 && score>=hiScore){
    ctx.save(); ctx.shadowBlur=10; ctx.shadowColor='#ff9900';
    ctx.fillStyle='#ff9900'; ctx.font='bold 16px ' + FONT_KR;
    ctx.fillText('🏅 신기록! 최고 점수 ' + hiScore + '점 달성!', W/2, by+188);
    ctx.restore();
  } else if(hiScore>0){
    ctx.fillStyle='#FFD700'; ctx.font='bold 15px ' + FONT_KR;
    ctx.fillText('🏅 최고 점수: ' + hiScore + '점', W/2, by+188);
  }

  drawBtn(W/2-95, by+218, 190, 48, '🔄  다시 하기', RED);
  drawBtn(W/2-95, by+276, 190, 48, '🏠  처음으로', 'rgba(255,255,255,0.12)', '#fff');

}

/* ── 메인 루프 ── */
let last = 0;
function loop(ts){
  const dt = Math.min((ts-last)/1000, 0.05); last = ts;
  ctx.clearRect(0, 0, W, H); drawBG();
  if(state === 'start')         drawStart();
  else if(state === 'playing')  updateAndDraw(dt);
  else if(state === 'gameover') drawGameOver();
  requestAnimationFrame(loop);
}
requestAnimationFrame(ts => { last=ts; requestAnimationFrame(loop); });
</script>
