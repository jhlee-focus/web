<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>🧩 퍼즐 게임</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: linear-gradient(135deg, #0d0d0d 0%, #1a0000 50%, #2a0a0a 100%);
      height: 100dvh;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
    }

    /* ── 홈 버튼 ── */
    .home-btn {
      position: fixed;
      top: 16px;
      left: 16px;
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,.1);
      border: 1px solid rgba(255,255,255,.2);
      color: rgba(255,255,255,.75);
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      padding: 8px 16px;
      border-radius: 50px;
      text-decoration: none;
      transition: background .2s, color .2s;
    }
    .home-btn:hover {
      background: rgba(255,255,255,.18);
      color: #fff;
    }

    .coming-soon {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      text-align: center;
    }
    .coming-icon { font-size: 5rem; }
    .coming-title {
      color: #fff;
      font-size: 2rem;
      font-weight: 900;
      text-shadow: 0 0 20px rgba(237,29,36,.5);
    }
    .coming-desc {
      color: rgba(255,255,255,.4);
      font-size: 1rem;
      font-weight: 700;
      line-height: 1.6;
    }
  </style>
</head>
<body>

  <a class="home-btn" href="index.html">← 홈으로</a>

  <div class="coming-soon">
    <div class="coming-icon">🧩</div>
    <div class="coming-title">준비 중이에요!</div>
    <div class="coming-desc">히어로 퍼즐 게임을 열심히 만들고 있어요.<br>조금만 기다려 주세요!</div>
  </div>

</body>
</html>
