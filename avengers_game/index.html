<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>⚡ MCU 게임 센터</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: linear-gradient(135deg, #0d0d0d 0%, #1a0000 50%, #2a0a0a 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px 60px;
      user-select: none;
    }

    /* ── 헤더 ── */
    .header {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      margin-bottom: 52px;
    }
    .marvel-badge {
      background: #ED1D24;
      color: #fff;
      font-size: 0.8rem;
      font-weight: 900;
      letter-spacing: 5px;
      padding: 4px 18px;
      border-radius: 4px;
      text-transform: uppercase;
    }
    h1 {
      color: #fff;
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 900;
      text-shadow: 0 0 30px rgba(237,29,36,0.7), 0 4px 12px rgba(0,0,0,.6);
      letter-spacing: -0.5px;
    }
    .subtitle {
      color: rgba(255,255,255,.4);
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 1px;
    }

    /* ── 게임 카드 그리드 ── */
    .game-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 260px));
      justify-content: center;
      gap: 24px;
      width: 100%;
      max-width: 980px;
    }

    /* ── 게임 카드 ── */
    .game-card {
      background: rgba(255,255,255,.05);
      border: 1.5px solid rgba(255,255,255,.1);
      border-radius: 24px;
      padding: 36px 24px 28px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      transition: transform .2s, box-shadow .2s, border-color .2s, background .2s;
    }
    .game-card:hover {
      transform: translateY(-7px);
      border-color: #ED1D24;
      background: rgba(237,29,36,.08);
      box-shadow: 0 16px 48px rgba(237,29,36,.28);
    }
    .game-card:active { transform: translateY(-2px); }

    .game-card.disabled {
      cursor: default;
      opacity: 0.5;
      pointer-events: none;
    }

    .card-icon {
      font-size: 3.8rem;
      filter: drop-shadow(0 0 14px rgba(237,29,36,.5));
    }
    .card-title {
      color: #fff;
      font-size: 1.35rem;
      font-weight: 900;
      text-align: center;
    }
    .card-desc {
      color: rgba(255,255,255,.45);
      font-size: 0.85rem;
      font-weight: 700;
      text-align: center;
      line-height: 1.6;
    }
    .card-badge {
      margin-top: 6px;
      padding: 6px 20px;
      border-radius: 50px;
      font-size: 0.82rem;
      font-weight: 700;
    }
    .badge-play {
      background: #ED1D24;
      color: #fff;
      box-shadow: 0 4px 14px rgba(237,29,36,.45);
    }
    .badge-soon {
      background: rgba(255,255,255,.08);
      color: rgba(255,255,255,.4);
      border: 1px solid rgba(255,255,255,.12);
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="marvel-badge">MARVEL</div>
    <h1>⚡ MCU 게임 센터</h1>
    <div class="subtitle">마블 시네마틱 유니버스(MCU)</div>
    <div class="subtitle" style="opacity:0.6; font-size:0.8rem;">히어로와 함께 즐기는 게임 모음</div>
  </div>

  <div class="game-grid">

    <a class="game-card" href="memory-game.html">
      <div class="card-icon">🃏</div>
      <div class="card-title">메모리 게임</div>
      <div class="card-desc">어벤져스 히어로 카드를<br>짝 맞춰 기억력을 키워요!</div>
      <div class="card-badge badge-play">▶ 게임 시작</div>
    </a>

    <a class="game-card" href="puzzle-game.html">
      <div class="card-icon">🔲</div>
      <div class="card-title">슬라이딩 퍼즐</div>
      <div class="card-desc">히어로 이미지를 밀고 당겨<br>원본 사진을 완성해요!</div>
      <div class="card-badge badge-play">▶ 게임 시작</div>
    </a>

    <a class="game-card" href="drag-puzzle.html">
      <div class="card-icon">🧩</div>
      <div class="card-title">직소 퍼즐</div>
      <div class="card-desc">올록볼록 퍼즐 조각을<br>제자리에 끌어다 맞춰요!</div>
      <div class="card-badge badge-play">▶ 게임 시작</div>
    </a>

    <a class="game-card" href="hero-run.html">
      <div class="card-icon">⚡</div>
      <div class="card-title">히어로 런</div>
      <div class="card-desc">어벤져스 히어로들로 빌런을 처치하고<br>장애물을 피해 달려요!</div>
      <div class="card-badge badge-play">▶ 게임 시작</div>
    </a>

  </div>

</body>
</html>
