<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Neon Cat's Cradle — MediaPipe Hands × p5.js</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #050018;
    color: #d8e8ff;
    font-family: "Segoe UI", "Helvetica Neue", sans-serif;
    overflow: hidden;
    height: 100%;
  }
  /* Layering (back → front):
       1  video    (mirrored camera feed)
       2  cameraTint (dark wash for neon contrast)
       5  canvas   (p5 visualization)
      10  scanlines
      11  vignette
      20  status / hint
  */
  #stage {
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at center, #0a0030 0%, #03000d 80%);
    z-index: 0;
    pointer-events: none;
  }
  /* Live camera feed: visible CSS background. Mirrored to match the canvas. */
  #input_video {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
    object-fit: cover;
    transform: scaleX(-1);
    z-index: 1;
    background: #050018;
    filter: saturate(1.05) contrast(1.05) brightness(0.85);
    pointer-events: none;
  }
  /* Subtle dark wash so neon overlays read clearly */
  #cameraTint {
    position: fixed;
    inset: 0;
    background: rgba(5, 0, 32, 0.30);
    pointer-events: none;
    z-index: 2;
  }
  /* p5 canvas: pinned full-screen ABOVE everything except CRT/vignette/UI */
  canvas {
    display: block;
    position: fixed !important;
    top: 0 !important;
    left: 0 !important;
    width: 100vw !important;
    height: 100vh !important;
    background: transparent;
    z-index: 5;
    pointer-events: none;
  }
  /* CRT scanline overlay */
  #scanlines {
    position: fixed;
    inset: 0;
    pointer-events: none;
    background: repeating-linear-gradient(
      to bottom,
      rgba(0,0,0,0.18) 0px,
      rgba(0,0,0,0.18) 1px,
      rgba(255,255,255,0.02) 2px,
      rgba(255,255,255,0.02) 3px
    );
    mix-blend-mode: overlay;
    z-index: 10;
  }
  #vignette {
    position: fixed;
    inset: 0;
    pointer-events: none;
    background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.65) 100%);
    z-index: 11;
  }
  #status {
    position: fixed;
    top: 14px;
    left: 16px;
    z-index: 20;
    font-size: 13px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #6cf0ff;
    text-shadow: 0 0 8px #00e7ff, 0 0 18px #5a00ff;
    background: rgba(5,0,24,0.55);
    padding: 6px 12px;
    border: 1px solid rgba(108, 240, 255, 0.35);
    border-radius: 4px;
    backdrop-filter: blur(4px);
  }
  #hint {
    position: fixed;
    bottom: 14px;
    right: 16px;
    z-index: 20;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #ff7ad8;
    text-shadow: 0 0 6px #ff00aa;
    opacity: 0.75;
  }
</style>
</head>
<body>
  <video id="input_video" playsinline muted autoplay></video>
  <div id="cameraTint"></div>
  <div id="stage"></div>
  <div id="scanlines"></div>
  <div id="vignette"></div>
  <div id="status">Initialising hands…</div>
  <div id="hint">Show both hands • touch fingertips for fireworks</div>

  <!-- p5.js + MediaPipe — fail loudly if the CDN is unreachable -->
  <script>
    function __cdnFail(name) {
      var el = document.getElementById('status');
      if (el) {
        el.textContent = 'CDN load failed: ' + name + '. Check your internet / try a local copy.';
        el.style.color = '#ff6688';
      }
      console.error('[neon-cradle] Failed to load library:', name);
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/p5@1.9.4/lib/p5.min.js"
          onerror="__cdnFail('p5.js')"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"
          crossorigin="anonymous" onerror="__cdnFail('mediapipe/camera_utils')"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"
          crossorigin="anonymous" onerror="__cdnFail('mediapipe/hands')"></script>

  <script>
  // ---------------------------------------------------------------------------
  // Neon Cat's Cradle
  // - MediaPipe Hands (2 hands) feeds normalized landmarks
  // - p5.js renders glowing dots, elastic strings, particle bursts on touch
  // - Raw video is hidden; instead we draw a soft neon silhouette of each hand
  // - CRT scanline overlay & midnight-blue vignette for the futuristic look
  // ---------------------------------------------------------------------------

  const FINGERTIP_IDS = [4, 8, 12, 16, 20];      // thumb, index, middle, ring, pinky
  const HAND_CONNECTIONS = [
    [0,1],[1,2],[2,3],[3,4],            // thumb
    [0,5],[5,6],[6,7],[7,8],            // index
    [5,9],[9,10],[10,11],[11,12],       // middle
    [9,13],[13,14],[14,15],[15,16],     // ring
    [13,17],[17,18],[18,19],[19,20],    // pinky
    [0,17]                              // palm base
  ];
  // Convex-hull-ish ordering of landmarks for a smooth silhouette
  const HAND_OUTLINE = [0, 1, 2, 3, 4, 8, 12, 16, 20, 17, 0];

  let landmarksList = [];   // latest results from MediaPipe (array of hands)
  let particles = [];
  let canvas, statusEl, videoEl;

  // Cover-fit transform from normalized (0..1, video-aspect) → canvas pixels.
  // Recomputed every frame so it survives window resizes & late video metadata.
  let videoTransform = { drawW: 0, drawH: 0, offsetX: 0, offsetY: 0 };

  // Elastic strings: persistent connection between Left fingertip i and Right fingertip i
  // We carry over previous endpoints to fake a tiny bit of inertia/elasticity.
  const stringState = Array.from({length: 5}, () => ({
    aPrev: null, bPrev: null
  }));

  // Per-fingertip cooldown so a sustained touch doesn't flood particles.
  const lastBurstAt = new Array(5).fill(0);
  const BURST_COOLDOWN_MS = 140;

  // ---------- p5 setup ----------
  function setup() {
    canvas = createCanvas(window.innerWidth, window.innerHeight);
    canvas.parent('stage');
    pixelDensity(1);          // perf: avoid 2x render on retina
    frameRate(60);
    statusEl = document.getElementById('status');
    if (typeof Hands === 'undefined' || typeof Camera === 'undefined') {
      statusEl.textContent = 'MediaPipe not available — check network/CDN.';
      return;
    }
    initMediaPipe();
  }

  function windowResized() {
    resizeCanvas(window.innerWidth, window.innerHeight);
  }

  // Compute a cover-fit rectangle for the camera's aspect inside the canvas.
  // Falls back to 16:9 until the <video> reports its real dimensions.
  function updateVideoTransform() {
    const vw = (videoEl && videoEl.videoWidth)  || 1280;
    const vh = (videoEl && videoEl.videoHeight) || 720;
    const ar = vw / vh;
    const cAr = width / height;
    let drawW, drawH;
    if (cAr > ar) {           // canvas is wider → match width, crop top/bottom
      drawW = width;
      drawH = width / ar;
    } else {                  // canvas is taller → match height, crop sides
      drawH = height;
      drawW = height * ar;
    }
    videoTransform.drawW   = drawW;
    videoTransform.drawH   = drawH;
    videoTransform.offsetX = (width  - drawW) / 2;
    videoTransform.offsetY = (height - drawH) / 2;
  }

  // Map a MediaPipe normalized landmark to canvas pixels with proper aspect.
  function mapX(nx) { return videoTransform.offsetX + nx * videoTransform.drawW; }
  function mapY(ny) { return videoTransform.offsetY + ny * videoTransform.drawH; }

  // ---------- MediaPipe wiring ----------
  function initMediaPipe() {
    videoEl = document.getElementById('input_video');

    const hands = new Hands({
      locateFile: (file) =>
        `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });
    hands.setOptions({
      maxNumHands: 2,
      modelComplexity: 1,
      minDetectionConfidence: 0.6,
      minTrackingConfidence: 0.5
    });
    hands.onResults((results) => {
      // MediaPipe Hands assumes a *mirrored* (selfie) input; the Camera util
      // sends the raw, unmirrored webcam frame, so its handedness labels are
      // swapped relative to what the user sees on the mirrored canvas.
      // → Flip the label here so "Left" really means the user's left hand.
      const paired = [];
      if (results.multiHandLandmarks) {
        for (let i = 0; i < results.multiHandLandmarks.length; i++) {
          const raw = results.multiHandedness?.[i]?.label || 'Right';
          const label = raw === 'Left' ? 'Right' : 'Left';
          paired.push({ landmarks: results.multiHandLandmarks[i], label });
        }
      }
      landmarksList = paired;
      if (statusEl) {
        statusEl.textContent = paired.length === 0
          ? 'Show your hands…'
          : `Tracking ${paired.length} hand${paired.length>1?'s':''}`;
      }
    });

    const camera = new Camera(videoEl, {
      onFrame: async () => { await hands.send({ image: videoEl }); },
      width: 1280,
      height: 720,
      facingMode: 'user'
    });
    camera.start().catch(err => {
      statusEl.textContent = 'Camera error: ' + err.message;
      console.error(err);
    });
  }

  // ---------- Drawing ----------
  function draw() {
    // Transparent clear — the camera <video> element behind the canvas shows
    // through, so we never draw the video to the canvas itself (more reliable
    // across browsers than image(videoEl, ...)).
    clear();

    // Recompute the cover-fit transform so resizes / late video metadata
    // never stretch the hand geometry away from the real camera aspect.
    updateVideoTransform();

    // Subtle ambient glow blobs (kept very faint so the camera shows through)
    drawSoftBackgroundGrid();

    // The CSS already mirrors the <video> element. We mirror the canvas the
    // same way so landmark coordinates land on top of the user's real hands.
    push();
    translate(width, 0);
    scale(-1, 1);

    const left  = landmarksList.find(h => h.label === 'Left');
    const right = landmarksList.find(h => h.label === 'Right');

    for (const h of landmarksList) drawHandSilhouette(h.landmarks, h.label);
    for (const h of landmarksList) {
      drawHandSkeleton(h.landmarks, h.label);
      drawHandJoints(h.landmarks, h.label);
    }

    if (left && right) {
      drawCradleStrings(left.landmarks, right.landmarks);
      checkFingertipCollisions(left.landmarks, right.landmarks);
    } else {
      for (const s of stringState) { s.aPrev = null; s.bPrev = null; }
    }

    updateAndDrawParticles();

    pop();
  }

  function drawSoftBackgroundGrid() {
    // very faint moving gradient pulses to give the CRT feel
    const t = millis() * 0.0006;
    noStroke();
    for (let i = 0; i < 3; i++) {
      const a = 8 + 4 * Math.sin(t + i);
      fill(20 + i * 6, 0, 60 + i * 10, a);
      ellipse(width * (0.3 + 0.2 * i), height * (0.5 + 0.15 * Math.sin(t + i)), 600, 600);
    }
  }

  // Soft glowing aura around the hand. Kept very subtle now that the real
  // camera image is visible underneath — just a colored halo, not a fill.
  function drawHandSilhouette(lm, label) {
    drawingContext.save();
    drawingContext.shadowBlur = 30;
    drawingContext.shadowColor = label === 'Left' ? '#00e0ff' : '#ff3ccf';
    noFill();
    stroke(label === 'Left' ? color(0, 220, 255, 110) : color(255, 80, 210, 110));
    strokeWeight(1.2);
    beginShape();
    for (const id of HAND_OUTLINE) {
      const p = lm[id];
      vertex(mapX(p.x), mapY(p.y));
    }
    endShape(CLOSE);
    drawingContext.restore();
  }

  function drawHandSkeleton(lm, label) {
    const c = label === 'Left' ? [0, 230, 255] : [255, 80, 220];
    drawingContext.save();
    drawingContext.shadowBlur = 12;
    drawingContext.shadowColor = label === 'Left' ? '#00e7ff' : '#ff44d4';
    stroke(c[0], c[1], c[2], 180);
    strokeWeight(2);
    noFill();
    for (const [a, b] of HAND_CONNECTIONS) {
      const pa = lm[a], pb = lm[b];
      line(mapX(pa.x), mapY(pa.y), mapX(pb.x), mapY(pb.y));
    }
    drawingContext.restore();
  }

  function drawHandJoints(lm, label) {
    drawingContext.save();
    for (let i = 0; i < lm.length; i++) {
      const p = lm[i];
      const isTip = FINGERTIP_IDS.includes(i);
      const baseColor = label === 'Left' ? '#00f6ff' : '#ff5ad6';
      drawingContext.shadowBlur = isTip ? 28 : 14;
      drawingContext.shadowColor = baseColor;
      noStroke();
      const px = mapX(p.x), py = mapY(p.y);
      // Outer halo
      fill(label === 'Left' ? color(0, 246, 255, 60) : color(255, 90, 214, 60));
      circle(px, py, isTip ? 22 : 12);
      // Bright core
      fill(255, 255, 255, isTip ? 230 : 200);
      circle(px, py, isTip ? 8 : 4);
    }
    drawingContext.restore();
  }

  // Five strings — thumb↔thumb, index↔index, … pinky↔pinky.
  // Color & thickness shift with distance to fake elastic tension.
  function drawCradleStrings(leftLm, rightLm) {
    // The three-stop neon palette
    const palette = [
      [0,   246, 255],   // cyan
      [255, 240, 0],     // yellow
      [255, 60,  220],   // magenta
      [120, 80,  255],   // violet
      [0,   255, 170]    // mint
    ];

    drawingContext.save();
    for (let i = 0; i < FINGERTIP_IDS.length; i++) {
      const id = FINGERTIP_IDS[i];
      const a = { x: mapX(leftLm[id].x),  y: mapY(leftLm[id].y)  };
      const b = { x: mapX(rightLm[id].x), y: mapY(rightLm[id].y) };

      // Elastic interpolation toward target (cheap inertia)
      const s = stringState[i];
      const ease = 0.35;
      if (!s.aPrev) s.aPrev = { ...a };
      if (!s.bPrev) s.bPrev = { ...b };
      s.aPrev.x += (a.x - s.aPrev.x) * ease;
      s.aPrev.y += (a.y - s.aPrev.y) * ease;
      s.bPrev.x += (b.x - s.bPrev.x) * ease;
      s.bPrev.y += (b.y - s.bPrev.y) * ease;

      const ax = s.aPrev.x, ay = s.aPrev.y;
      const bx = s.bPrev.x, by = s.bPrev.y;

      const dx = bx - ax, dy = by - ay;
      const dist = Math.sqrt(dx * dx + dy * dy);
      // Tension is referenced against the video's *drawn* width so it stays
      // consistent regardless of window aspect / letterboxing.
      const refW = videoTransform.drawW || width;
      const tension = constrain(dist / (refW * 0.7), 0, 1);

      // Sag toward the bottom — looks like a real string under gravity, less when taut
      const sag = (1 - tension) * 80;
      const mx = (ax + bx) / 2;
      const my = (ay + by) / 2 + sag;

      // Pick color: interpolate within palette by tension
      const col = palette[i % palette.length];
      const stretchTint = lerpColor(
        color(col[0], col[1], col[2]),
        color(255, 255, 255),
        tension
      );

      // Glowing laser-beam effect — draw twice with varying blur for depth
      drawingContext.shadowBlur = 24;
      drawingContext.shadowColor = `rgb(${col[0]}, ${col[1]}, ${col[2]})`;
      stroke(red(stretchTint), green(stretchTint), blue(stretchTint), 220);
      strokeWeight(lerp(1.4, 4.5, tension));
      noFill();
      // Quadratic bezier so the string can sag naturally
      beginShape();
      vertex(ax, ay);
      quadraticVertex(mx, my, bx, by);
      endShape();

      // Inner bright core
      drawingContext.shadowBlur = 8;
      stroke(255, 255, 255, 180);
      strokeWeight(lerp(0.5, 1.6, tension));
      beginShape();
      vertex(ax, ay);
      quadraticVertex(mx, my, bx, by);
      endShape();
    }
    drawingContext.restore();
  }

  // ---------- Particles ----------
  function checkFingertipCollisions(leftLm, rightLm) {
    const now = millis();
    // Hit threshold scales with video size so it works at any aspect ratio
    const refW = videoTransform.drawW || width;
    const hitDist = Math.max(18, refW * 0.022);
    for (let i = 0; i < FINGERTIP_IDS.length; i++) {
      const id = FINGERTIP_IDS[i];
      const ax = mapX(leftLm[id].x);
      const ay = mapY(leftLm[id].y);
      const bx = mapX(rightLm[id].x);
      const by = mapY(rightLm[id].y);
      const d = dist(ax, ay, bx, by);
      if (d < hitDist && now - lastBurstAt[i] >= BURST_COOLDOWN_MS) {
        lastBurstAt[i] = now;
        spawnBurst((ax + bx) / 2, (ay + by) / 2);
      }
    }
  }

  function spawnBurst(x, y) {
    // Drop particle count if we're already near the cap to protect frame rate
    const headroom = 600 - particles.length;
    const n = Math.min(22, Math.max(6, headroom));
    const palette = ['#00f6ff', '#fff200', '#ff5ad6', '#a577ff', '#7dffd0'];
    for (let i = 0; i < n; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = 2 + Math.random() * 6;
      particles.push({
        x, y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        life: 1.0,
        decay: 0.012 + Math.random() * 0.02,
        size: 3 + Math.random() * 4,
        color: palette[Math.floor(Math.random() * palette.length)]
      });
    }
  }

  function updateAndDrawParticles() {
    drawingContext.save();
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx;
      p.y += p.vy;
      p.vx *= 0.96;
      p.vy = p.vy * 0.96 + 0.08; // light gravity
      p.life -= p.decay;
      if (p.life <= 0) { particles.splice(i, 1); continue; }
      drawingContext.shadowBlur = 18;
      drawingContext.shadowColor = p.color;
      noStroke();
      fill(red(color(p.color)), green(color(p.color)), blue(color(p.color)), 255 * p.life);
      circle(p.x, p.y, p.size * (0.4 + p.life));
    }
    // Hard cap so a long touch doesn't pile up forever
    if (particles.length > 600) particles.splice(0, particles.length - 600);
    drawingContext.restore();
  }
  </script>
</body>
</html>
